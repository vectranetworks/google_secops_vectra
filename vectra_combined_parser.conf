                    }
                    on_error => "user_roles_not_merge"
                }
            }

            if ![message_field_not_found] and [msg] =~ "log in" {

                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.user.user_display_name" => "%{user}"
                    }
                    on_error => "user_missing"
                }
                if ![user_missing] {
                    mutate {
                        replace => {
