                    replace => {
                        "category_temp" => "NETWORK_RECON"
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "category_temp" => "UNKNOWN_CATEGORY"
                    }
                }
            }

            mutate {
                merge => {
                    "security_result_temp.category_details" => "category"
                }
                on_error => "security_result_temp_category_details_not_merge"
            }

            mutate {
                merge => {
                    "security_result_temp.category" => "category_temp"
                }
                on_error => "security_result_temp_category_not_merge"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" => "%{d_type_vname}"
                }
                on_error => "d_type_vname_missing"
            }

            mutate {
                convert => {
                    "detection_id" => "string"
                }
                on_error => "detection_id_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_log_id" => "%{detection_id}"
                }
                on_error => "detection_id_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_name" => "XDR"
                }
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
                }
            }

            # url
            mutate {
                convert => {
                    "url" => "string"
                }
                on_error => "url_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.url" => "%{url}"
                }
                on_error => "url_missing"
            }

            for index,name in mitre {
                mutate {
                    replace => {
                        "techniques_temp" => ""
                    }
                }
                mutate {
                    replace => {
                        "techniques_temp.id" => "%{name}"
                    }
                    on_error => "mitre_not_string"
                }
                mutate {
                    merge => {
                        "security_result_temp.attack_details.techniques" => "techniques_temp"
                    }
