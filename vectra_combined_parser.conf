                        }
                    }
                }
                else if [proto] in ['TCP', '6', 6 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "TCP"
                        }
                    }
                }
                else if [proto] in ['UDP', '17', 17 ] {
