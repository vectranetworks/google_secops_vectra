            mutate {
                convert => {
                    "_headend_addr" => "ipaddress"
                }
                on_error => "headend_addr_not_convert"
            }
            if ![headend_addr_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.observer.ip" => "headend_addr"
                    }
                    on_error => "headend_addr_missing"
                }
            }

            mutate {
                convert => {
                    "user" => "string"
                }
                on_error => "user_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.observer.user.user_display_name" => "%{user}"
                }
                on_error => "observer_user_display_name_missing"
            }

            # Security Result
            mutate {
                replace => {
                    "security_result_temp" => ""
                }
            }

            mutate {
                convert => {
                    "action" => "string"
                }
                on_error => "action_not_convert"
            }
            mutate {
                replace => {
                    "action" => "%{action}"
                }
                on_error => "action_missing"
            }

            if ![action_missing] and [action] != "" {
                if [action] == "lock" {
                    mutate {
                        replace => {
                            "action_taken" => "BLOCK"
                        }
                    }
                }
                else if [action] == "unlock" {
                    mutate {
                        replace => {
                            "action_taken" => "ALLOW"
                        }
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "action_taken"
                    }
                    on_error => "security_result_action_not_merged"
                }
                mutate {
                    replace => {
                        "security_result_temp.action_details" => "%{action}"
                    }
                    on_error => "security_result_action_details_missing"
                }
            }

            mutate {
                convert => {
                    "success" => "string"
                }
                on_error => "success_not_convert"
            }
            mutate {
                replace => {
                    "success" => "%{success}"
                }
                on_error => "success_missing"
            }
            if ![success_missing] and [success] != "" {
                mutate {
                    replace => {
                        "success_label.value" => "%{success}"
                    }

                    on_error => "success_label_set_failed"
                }

                if ![success_label_set_failed] {
                    mutate {
                        replace => {
                            "success_label.key" => "success"
                        }
                    }
                    mutate {
                        merge => {
                            "security_result_temp.detection_fields" => "success_label"
                        }
                        on_error => "security_result_success_label_not_merged"
                    }
                }
            }

            mutate {
                convert => {
                    "will_retry" => "string"
                }
                on_error => "will_retry_not_convert"
            }
            mutate {
                replace => {
                    "will_retry" => "%{will_retry}"
                }
                on_error => "will_retry_missing"
            }
            if ![will_retry_missing] and [will_retry] != "" {
                mutate {
                    replace => {
                        "will_retry_label.value" => "%{will_retry}"
                    }
                    on_error => "will_retry_missing"
                }

                if ![will_retry_missing] and [will_retry] != "" {
                    mutate {
                        replace => {
                            "will_retry_label.key" => "will_retry"
                        }
                    }
                    mutate {
                        merge => {
                            "security_result_temp.detection_fields" => "will_retry_label"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "href" => "string"
                }
                on_error => "href_not_convert"
            }
            mutate {
                replace => {
                    "security_result_temp.url_back_to_product" => "%{href}"
                }
                on_error => "security_result_url_back_to_product_missing"
            }

            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" => "security_result_temp"
                }
                on_error => "security_result_not_merged"
            }

            if [category] =~ "(?i)HOST" and [principal_present] == "true" {
                # Due to EDR validation issue from google side change event type to GENERIC_EVENT
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
                    }
                }
            }
            if [category] =~ "(?i)ACCOUNT" and [principal_present] == "true" {
                # Due to EDR validation issue from google side change event type to GENERIC_EVENT
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
                    }
                }
            }
            mutate {
                replace => {
                    "log_type_lable.key" => "log_type"
                    "log_type_lable.value.string_value" => "Lockdown"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" => "log_type_lable"
                }
            }
        }
        # Health
        else if ![type_present] {
            mutate {
                replace => {
                    "principal_present" => "false"
                }
            }
            mutate {
                convert => {
                    "vectra_timestamp" => "string"
                }
                on_error => "vectra_timestamp_not_convert"
            }
            date {
                match => ["vectra_timestamp", "UNIX", "UNIX_MS" ]
                on_error => "vectra_timestamp_not_valid"
            }

            mutate {
                convert => {
                    "type" => "string"
                }
                on_error => "type_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" => "%{type}"
                }
                on_error => "type_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_name" => "Detect"
                }
            }

            mutate {
                convert => {
                    "version" => "string"
                }
                on_error => "version_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_version" => "%{version}"
                }
                on_error => "version_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
                }
            }

            mutate {
                convert => {
                    "dvchost" => "string"
                }
                on_error => "dvchost_not_convert"
            }
            mutate {
                replace => {
                    "dvchost" => "%{dvchost}"
                }
                on_error => "dvchost_missing"
            }
            if ![dvchost_missing] and [dvchost] =~ "(^.{0,256}$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.observer.hostname" => "%{dvchost}"
                    }
                    on_error => "dvchost_missing"
                }
            }

            mutate {
                convert => {
                    "headend_addr" => "string"
                }
                on_error => "headend_addr_not_convert"
            }
            mutate {
                replace => {
                    "_headend_addr" => "%{headend_addr}"
                }
                on_error => "headend_addr_not_present"
            }
            mutate {
                convert => {
                    "_headend_addr" => "ipaddress"
                }
                on_error => "headend_addr_not_convert"
            }
            if ![headend_addr_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.observer.ip" => "headend_addr"
                    }
                    on_error => "headend_addr_not_merged"
                }
            }

            mutate {
                convert => {
                    "result" => "string"
                }
                on_error => "result_not_convert"
            }
            mutate {
                replace => {
                    "result" => "%{result}"
                }
                on_error => "result_missing"
            }
            if ![result_missing] and [result] == "success" {
                mutate {
                    replace => {
                        "ALLOW_temp" => "ALLOW"
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "ALLOW_temp"
                    }
                    on_error => "security_result_temp_action_not_merge"
                }
            }
            else if ![result_missing] and [result] == "failure" {
                mutate {
                    replace => {
                        "FAIL_temp" => "FAIL"
                    }
                    on_error => "FAIL"
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "FAIL_temp"
                    }
                    on_error => "security_result_temp_action_not_merge"
                }
            }
            mutate {
                replace => {
                    "security_result_temp.action_details" => "%{result}"
                }
                on_error => "result_missing"
            }

            mutate {
                convert => {
                    "message" => "string"
                }
                on_error => "message_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{msg}"
                }
                on_error => "message_missing"
            }

            mutate {
                convert => {
                    "source_ip" => "string"
                }
                on_error => "source_ip_not_convert"
            }
            mutate {
                replace => {
                    "_source_ip" => "%{source_ip}"
                }
                on_error => "source_ip_not_convert"
            }
            mutate {
                convert => {
                    "_source_ip" => "ipaddress"
                }
                on_error => "source_ip_not_convert"
            }
            if ![source_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "source_ip"
                    }
                    on_error => "source_ip_not_merge"
                }
                if ![source_ip_not_merge] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }

            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" => "security_result_temp"
                }
                on_error => "event_idm_read_only_udm_security_result_not_merge"
            }

            if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
                    }
                }
            }
            mutate {
                replace => {
                    "log_type_lable.key" => "log_type"
                    "log_type_lable.value.string_value" => "Health"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" => "log_type_lable"
                }
            }
        }
        # Match
        else if ![event_type_present] {
            mutate {
                replace => {
                    "principal_present" => "false"
                }
            }
            # metadata
            mutate {
                convert => {
                    "timestamp" => "string"
                }
                on_error => "_"
            }
            date {
                match => ["timestamp", "UNIX", "UNIX_MX","ISO8601"]
                target => "event.idm.read_only_udm.metadata.event_timestamp"
                on_error => "timestamp_field_not_convert"
            }
            mutate {
                convert => {
                    "event_type" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" => "%{event_type}"
                }
                on_error => "event_type_not_found"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_name" => "Detect"
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
                }
            }
            # principal
            mutate {
                convert => {
                    "vectra.orig_huid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "vectra_orig_huid" => "%{vectra.orig_huid}"
                }
                on_error => "vectra_orig_huid_missing"
            }
            if ![vectra_orig_huid_missing] and [vectra][orig_huid] != "" {
                if [vectra][orig_huid] =~ "(^.*\:.*$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.asset_id" => "%{vectra.orig_huid}"
                        }
                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.asset_id" => "Detect:%{vectra.orig_huid}"
                        }
                    }
                }
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }

            mutate {
                convert => {
                    "vectra.orig_hostname" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.hostname" => "%{vectra.orig_hostname}"
                }
                on_error => "vectra_orig_hostname_not_found"
            }
            if ![vectra_orig_hostname_not_found] {
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }
            mutate {
                convert => {
                    "src_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_src_ip" => "%{src_ip}"
                }
                on_error => "src_ip_missing"
            }
            mutate {
                convert => {
                    "temp_src_ip" => "ipaddress"
                }
                on_error => "src_ip_not_convert"
            }
            if ![src_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "src_ip"
                    }
                    on_error => "src_ip_not_string"
                }
                if ![src_ip_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "flow.src_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_flow_src_ip" => "%{flow.src_ip}"
                }
                on_error => "flow_src_ip_missing"
            }
            mutate {
                convert => {
                    "temp_flow_src_ip" => "ipaddress"
                }
                on_error => "flow_src_ip_not_convert"
            }
            if ![flow_src_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "flow.src_ip"
                    }
                    on_error => "flow_src_ip_not_string"
                }
                if ![flow_src_ip_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "src_port" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.port" => "%{src_port}"
                }
                on_error => "src_port_missing"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.principal.port" => "integer"
                }
                on_error => "src_port_not_convert"
            }
            if [src_port_not_convert] {
                mutate {
                    remove_field => ["event.idm.read_only_udm.principal.port"]
                }
                mutate {
                    convert => {
                        "flow.src_port" => "string"
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.port" => "%{flow.src_port}"
                    }
                    on_error => "flow_src_port_missing"
                }
                mutate {
                    convert => {
                        "event.idm.read_only_udm.principal.port" => "integer"
                    }
                    on_error => "flow_src_port_not_convert"
                }
                if [flow_src_port_not_convert] {
                    mutate {
                        remove_field => ["event.idm.read_only_udm.principal.port"]
                    }
                }
            }


            mutate {
                convert => {
                    "vectra.orig_sluid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "attribute_labels.value" => "%{vectra.orig_sluid}"
                }
                on_error => "vectra_orig_sluid_missing"
            }
            if ![vectra_orig_sluid_missing] and [attribute_labels][value] != "" {
                mutate {
                    replace => {
                        "attribute_labels.key" => "vectra_orig_sluid"
                    }
                    on_error => "vectra_orig_sluid_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.asset.attribute.labels" => "attribute_labels"
                    }
                    on_error => "attribute_labels_missing"
                }
            }
            # intermediary

            mutate {
                convert => {
                    "tunnel.src_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_tunnel_src_ip" => "%{tunnel.src_ip}"
                }
                on_error => "tunnel_src_ip_missing"
            }
            mutate {
                convert => {
                    "temp_tunnel_src_ip" => "ipaddress"
                }
                on_error => "tunnel_src_ip_not_convert"
            }
            if ![tunnel_src_ip_not_convert] {
                mutate {
                    merge => {
                        "intermediary_temp.ip" => "tunnel.src_ip"
                    }
                    on_error => "tunnel_src_ip_not_string"
                }
            }

            mutate {
                convert => {
                    "tunnel.src_port" => "integer"
                }
                on_error => "tunnel_src_port_not_convert"
            }
            if ![tunnel_src_port_not_convert] {
                mutate {
                    rename => {
                        "tunnel.src_port" => "intermediary_temp.port"
                    }
                }
            }

            mutate {
                convert => {
                    "tunnel.proto" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "tunnel_proto" => "%{tunnel.proto}"
                }
                on_error => "tunnel_proto_missing"
            }
            if ![tunnel_proto_missing] {
                mutate {
                    uppercase => [ "tunnel_proto" ]
                    on_error => "_"
                }

                if [tunnel_proto] in ['EIGRP', '88', 88 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "EIGRP"
                        }
                    }
                }
                else if [tunnel_proto] in ['ESP', '50', 50 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "ESP"
                        }
                    }
                }
                else if [tunnel_proto] in ['ETHERIP', '97', 97 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "ETHERIP"
                        }
                    }
                }
                else if [tunnel_proto] in ['GRE', '47', 47 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "GRE"
                        }
                    }
                }
                else if [tunnel_proto] in ['ICMP', '1', 1 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "ICMP"
                        }
                    }
                }
                else if [tunnel_proto] in ['ICMP6', '58', 58 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "ICMP6"
                        }
                    }
                }
                else if [tunnel_proto] in ['IGMP', '2', 2 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "IGMP"
                        }
                    }
                }
                else if [tunnel_proto] in ['IP6IN4', '41', 41 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "IP6IN4"
                        }
                    }
                }
                else if [tunnel_proto] in ['PIM', '103', 103 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "PIM"
                        }
                    }
                }
                else if [tunnel_proto] in ['SCTP', '132', 132 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "SCTP"
                        }
                    }
                }
                else if [tunnel_proto] in ['TCP', '6', 6 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "TCP"
                        }
                    }
                }
                else if [tunnel_proto] in ['UDP', '17', 17 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "UDP"
                        }
                    }
                }
                else if [tunnel_proto] in ['UNKNOWN_IP_PROTOCOL', '0', 0 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "UNKNOWN_IP_PROTOCOL"
                        }
                    }
                }
                else if [tunnel_proto] in ['VRRP', '112', 112 ] {
                    mutate {
                        replace => {
                            'intermediary_temp.network.ip_protocol' => "VRRP"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "tunnel.dest_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_tunnel_dest_ip" => "%{tunnel.dest_ip}"
                }
                on_error => "tunnel_dest_ip_missing"
            }
            mutate {
                convert => {
                    "temp_tunnel_dest_ip" => "ipaddress"
                }
                on_error => "tunnel_dest_ip_not_convert"
            }
            if ![tunnel_dest_ip_not_convert] {
                mutate {
                    merge => {
                        "intermediary_temp.ip" => "tunnel.dest_ip"
                    }
                    on_error => "tunnel_dest_ip_not_string"
                }
            }

            mutate {
                convert => {
                    "tunnel.dest_port" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "intermediary_temp.port" => "%{tunnel.dest_port}"
                }
                on_error => "tunnel_dest_port_missing"
            }
            mutate {
                convert => {
                    "intermediary_temp.port" => "integer"
                }
                on_error => "tunnel_dest_port_not_convert"
            }
            if [tunnel_dest_port_not_convert] {
                mutate {
                    remove_field => ["intermediary_temp.port"]
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.intermediary" => "intermediary_temp"
                }
                on_error => "event_idm_read_only_udm_intermediary_not_merge"
            }
            # target
            mutate {
                convert => {
                    "vectra.resp_huid" => "string"
                }
                on_error => "_"
            }

            mutate {
                replace => {
                    "vectra_resp_huid" => "%{vectra.resp_huid}"
                }
                on_error => "vectra_resp_huid_missing"
            }

            if ![vectra_resp_huid_missing] and [vectra][resp_huid] != "" {
                if [vectra][resp_huid] =~ "(^.*\:.*$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.asset_id" => "%{vectra.resp_huid}"
                        }
                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.asset_id" => "Detect:%{vectra.resp_huid}"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "vectra.resp_hostname" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.hostname" => "%{vectra.resp_hostname}"
                }
                on_error => "vectra_resp_hostname_missing"
            }

            mutate {
                convert => {
                    "dest_ip" => "string"
                }
                on_error => "_"
            }

