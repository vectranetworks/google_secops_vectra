                    }
                    if ![entity_uid_missing] {
                        mutate {
                            replace => {
                                "principal_user_present" => "true"
                            }
                        }
                    }
                }
                else {
                    mutate {
                        replace => {
                            "var_entity_uid" => ""
                        }
                        on_error => "_"
                    }
                    mutate {
                        replace => {
                            "var_entity_uid.value" => "%{entity_uid}"
                        }
                        on_error => "var_entity_uid_value_missing"
                    }
