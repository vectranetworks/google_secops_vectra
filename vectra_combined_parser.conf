                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.asset_id" => "Vectra:%{entity_id}"
                        }
                        on_error => "entity_id_missing"
                    }
                }
                if ![entity_id_missing] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
                mutate {
                    replace => {
                        "entity_uid" => "%{entity_uid}"
                    }
                    on_error => "entity_uid_not_found"
                }
                if ![entity_uid_not_found] and [entity_uid] =~ "(^.{0,256}$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.hostname" => "%{entity_uid}"
