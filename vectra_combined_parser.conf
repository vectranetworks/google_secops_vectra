                }
                on_error => "headend_addr_not_convert"
            }
            if ![headend_addr_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.observer.ip" => "headend_addr"
                    }
                    on_error => "headend_addr_not_string"
                }
            }

            # security_result
            mutate {
                convert => {
                    "result" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "result_label.value" => "%{result}"
                }
                on_error => "result_field_missing"
            }
            if ![result_field_missing] and [result_label][value] != "" {
                mutate {
                    replace => {
                        "result_label.key" => "result"
                    }
                    on_error => "result_key_missing"
                }
                mutate {
                    merge => {
                        "security_result.detection_fields" => "result_label"
                    }
                    on_error => "result_label_missing"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" => "security_result"
                }
                on_error => "security_result_not_merge"
            }

            if ![message_field_not_found] and [msg] =~ "log in" and [target_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
                    }
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.extensions.auth.auth_details" => "%{msg}"
