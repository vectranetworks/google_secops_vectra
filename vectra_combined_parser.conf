            mutate {
                convert => {
                    "severity" => "string"
                }
                on_error => "severity_not_convert"
            }
            mutate {
                replace => {
                    "security_result_temp.severity_details" => "%{severity}"
                }
                on_error => "severity_missing"
            }

            mutate {
                convert => {
                    "detection_href" => "string"
                }
                on_error => "detection_href_not_convert"
            }
            mutate {
                replace => {
                    "security_result_temp.url_back_to_product" => "%{detection_href}"
                }
                on_error => "detection_href_not_string"
            }

            for key, value in detail map {
                mutate {
                    replace => {
                        "detail_label" => ""
                    }
                }
                mutate {
                    convert => {
                        "key" => "string"
                    }
                    on_error => "detail_key_conversion_error"
                }

                mutate {
                    convert => {
                        "value" => "string"
                    }
                    on_error => "detail_value_conversion_error"
                }

                mutate {
                    replace => {
                        "detail_label.value.string_value" => "%{value}"
                    }
                    on_error => "detail_not_found"
                }

                if ![detail_not_found] and [detail_label][value][string_value] != "" {
                    mutate {
                        replace => {
                            "detail_label.key" => "detail_%{key}"
                        }
                    }
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.additional.fields" => "detail_label"
                        }
                    }
                }
            }

            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" => "security_result_temp"
                }
                on_error => "event_idm_read_only_udm_security_result_not_merge"
            }

            # Event type
            if [d_type_vname] == "M365 Internal Spearphishing" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "EMAIL_TRANSACTION"
                    }
                }
            }
            else if [d_type_vname] == "M365 Suspicious Mail Forwarding" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "EMAIL_UNCATEGORIZED"
                    }
                }
            }
            else if [d_type_vname] in ["ICMP Tunnel", "Hidden Tunnel", "Hidden DNS Tunnel", "Multi-home Fronted Tunnel", "Peer-To-Peer", "Suspect Domain Activity", "Suspicious Relay", "TOR Activity", "Automated Replication", "ICMP Tunnel: Client", "ICMP Tunnel: Server", "Kerberoasting: Targeted Weak Cipher Response", "Shell Knocker Client", "Shell Knocker Server", "SQL Injection Activity", "Stage Loader", "Suspicious Remote Execution", "Data Smuggler", "Hidden DNS Tunnel", "ICMP Tunnel", "Smash and Grab", "Suspect TCP Activity", "Suspect DNS Activity", "Azure AD TOR Activity", "AWS TOR Activity", "AWS ECR Hijacking", "AWS Suspect Organization Exit", "AWS Cryptomining", "AWS Suspect Traffic Mirror Creation", "Azure Anomalous AppService WebJob Activity", "Azure Cryptomining", "Azure TOR Activity", "Azure Anomalous App Service WebJob Activity"] {
                if [principal_present] == "true" and [target_present] == "true" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
                        }
                    }
                }
            }
            else if [d_type_vname] in ["Hidden HTTP Tunnel", "Hidden HTTPS Tunnel", "Stealth HTTP Post", "Suspicious HTTP", "Hidden HTTP Tunnel", "Hidden HTTPS Tunnel", "Suspect HTTP Activity", "Suspect HTTPS Activity"] {
                if [principal_present] == "true" and [target_present] == "true" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
                        }
                    }
                }
            }
            else if [d_type_vname] in ["Malware Update", "Cryptocurrency Mining", "Ransomware File Activity", "Suspicious Active Directory Operations", "Data Gathering", "Novel Admin Protocol Usage", "Novel External Destination Port", "Novel Access to SMB Admin Share", "Single Weak Kerberos Cipher Response", "M365 Attacker Tool: Ruler", "M365 Disabling of Security Tools", "M365 Log Disabling Attempt", "M365 Malware Stage: Upload", "M365 Ransomware"] {
                if [principal_present] == "true" and [target_present] == "true" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_UNCATEGORIZED"
                        }
                    }
                }
            }
            else if [d_type_vname] in ["New Host", "New Host Role", "Novel Mac Vendor", "Vectra Indicator Match"] {
                if [principal_present] == "true" {
                    # Due to EDR validation issue from google side change event type to GENERIC_EVENT
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
                        }
                    }
                }
            }
            else if [d_type_vname] in ["Threat Intelligence Match", "Vectra Threat Intelligence Match", "Outbound DoS", "Outbound Port Sweep", "File Share Enumeration", "Internal Darknet Scan", "Kerberoasting: Weak Cipher Request", "Kerberoasting: SPN Sweep", "Kerberos Account Scan", "RDP Recon", "RPC Recon", "RPC Targeted Recon", "SMB Account Scan", "Suspicious LDAP Query", "Suspicious Port Scan", "Suspicious Port Sweep", "Threat Intelligence Match", "Threat Intelligence Match", "M365 Power Automate HTTP Flow Creation", "M365 Suspicious Power Automate Flow Creation", "AWS External Network Discovery", "AWS Network Configuration Discovery", "AWS Organization Discovery", "AWS S3 Enumeration", "AWS Suspect Discovery from EC2 Instance", "AWS Suspect Escalation Reconnaissance", "AWS Suspicious EC2 Enumeration", "AWS User Permissions Enumeration"] {
                if [principal_present] == "true" {
                    # Due to EDR validation issue from google side change event type to GENERIC_EVENT
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
                        }
                    }
                }
            }
            else if [d_type_vname] in ["Azure AD Login From Suspicious Location", "Azure AD MFA-Failed Suspicious Sign-On", "Azure AD Suspicious Sign-on", "Azure AD Suspected Compromised Access", "Azure AD Successful Brute-Force", "Azure AD Login Attempt to Disabled Account", "Azure Managed Identity Anomaly"] {
                if [target_present] == "true" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
                        }
                    }
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.extensions.auth.auth_details" => "%{d_type_vname}"
                        }
                    }
