                    "principal_user_present" => "false"
                    "target_present" => "false"
                }
            }
            mutate {
                convert => {
                    "event_timestamp" => "string"
                }
                on_error => "event_timestamp_not_convert"
            }
            date {
                match => ["event_timestamp", "ISO8601", "UNIX", "UNIX_MS"]
                on_error => "event_timestamp_not_valid"
            }

            mutate {
                convert => {
                    "type" => "string"
                }
                on_error => "type_not_convert"
            }

            mutate {
                replace => {
                    "type" => "%{type}"
                }
                on_error => "type_not_found"
            }

            mutate {
                replace => {
                    "srcip" => "%{src_ip}"
                }
                on_error => "src_ip_not_found"
            }
            mutate {
                convert => {
                    "srcip" => "ipaddress"
                }
                on_error => "valid_ip"
            }
            if ![valid_ip] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "src_ip"
                    }
                    on_error => "src_ip_not_found"
                }
                if ![src_ip_not_found] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "entity_id" => "string"
                }
                on_error => "entity_id_not_convert"
            }
            mutate {
                convert => {
                    "entity_uid" => "string"
                }
                on_error => "entity_uid_not_convert"
            }

            if ![type_not_found] and [type] == "host" {
                mutate {
