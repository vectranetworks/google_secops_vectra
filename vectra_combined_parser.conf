            }
            if ![category_not_found] and [category] =~ "(?i)COMMAND & CONTROL" {
                mutate {
                    replace => {
                        "category_temp" => "NETWORK_COMMAND_AND_CONTROL"
                    }
                }
            }
            else if ![category_not_found] and [category] =~ "(?i)BOTNET ACTIVITY" {
                mutate {
