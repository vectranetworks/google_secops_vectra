                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "UDP"
                        }
                    }
                }
                else if [proto] in ['UNKNOWN_IP_PROTOCOL', '0', 0 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "UNKNOWN_IP_PROTOCOL"
                        }
