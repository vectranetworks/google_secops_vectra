                        }
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.user.user_display_name" => "%{user}"
                    }
                    on_error => "user_missing"
                }
            }
            # observer
            mutate {
                replace => {
                    "event.idm.read_only_udm.observer.hostname" => "%{dvchost}"
