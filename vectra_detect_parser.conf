                    }
                    on_error => "payload_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "payload_label"
                    }
                    on_error => "payload_not_merge"
                }
            }

            mutate {
                convert => {
                    "pkt_src" => "string"
                }
                on_error => "_"
            }
            mutate {
