                    on_error => "pkt_src_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "pkt_src_label"
                    }
                    on_error => "pkt_src_not_merge"
                }
            }

            mutate {
                convert => {
                    "stream" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "stream_label.value.string_value" =>
                    "%{stream}"
                }
                on_error => "stream_missing"
            }
            if !([stream_missing]) and [stream_label][value][string_value] !="" {
                mutate {
                    replace => {
                        "stream_label.key" => "stream"
                    }
                    on_error => "stream_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "stream_label"
                    }
                    on_error => "stream_not_merge"
                }
            }

            mutate {
                convert => {
                    "tunnel.depth" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "tunnel_depth_label.value.string_value" =>
                    "%{tunnel.depth}"
                }
                on_error => "tunnel_depth_missing"
            }
            if !([tunnel_depth_missing])
            and [tunnel_depth_label][value][string_value] !="" {
                mutate {
                    replace => {
                        "tunnel_depth_label.key" => "tunnel_depth"
                    }
                    on_error => "tunnel_depth_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "tunnel_depth_label"
                    }
                    on_error => "tunnel_depth_not_merge"
                }
            }

            mutate {
                convert => {
                    "tunnel_pkt_src.depth" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "tunnel_pkt_src_label.value.string_value" =>
                    "%{tunnel.pkt_src}"
                }
                on_error => "tunnel_pkt_src_missing"
            }
            if !([tunnel_pkt_src_missing])
            and [tunnel_pkt_src_label][value][string_value] !="" {
                mutate {
                    replace => {
                        "tunnel_pkt_src_label.key" => "tunnel_pkt_src"
                    }
                    on_error => "tunnel_pkt_src_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "tunnel_pkt_src_label"
