                "%{packet_info.linktype}"
            }
            on_error => "packet_info_linktype_missing"
        }
        if !([packet_info_linktype_missing])
        and [packet_info_linktype_label][value][string_value] !="" {
            mutate {
                replace => {
                    "packet_info_linktype_label.key" => "packet_info_linktype"
                }
