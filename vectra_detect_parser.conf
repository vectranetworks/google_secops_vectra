                "last_detection_id_label" => ""
                "additional_details_ports" => ""
                "additional_details_ports_label" => ""
                "detail_account_uid" => ""
            }
        }

        mutate {
            gsub => ["message","\\r\\n",""]
        }
        mutate {
            convert => {
                "triaged" => "boolean"
            }
        }
        mutate {
            gsub => ["message", "message", "msg_data"]
        }
        # remove syslog header
        grok {
            match => {
                "message" => [ "<\\d+>.* vectra_json(_(?P<json_log_type>\\w+))? \\S+:(?P<vectra_json>.*)" ,
                "<%{INT}>%{TIMESTAMP_ISO8601:time} %{DATA}: (?P<desc>Server \\'%{DATA:hostname}\\'.*)",
                "<\\d+>%{TIMESTAMP_ISO8601:time} %{DATA}:\\s+%{GREEDYDATA:vectra_json}" ,
                "<\\d+>%{SYSLOGTIMESTAMP:timestamp} %{DATA:hostname} -- MARK --" ,
                ]
            }
            on_error => "grok_json_format_failed"
            overwrite => [ "json_log_type","hostname","timestamp" ,"time","vectra_json"]
        }
        json {
            source => "message"
            array_function => "split_columns"
            on_error => "msg_json_failed"
        }
        if [timestamp] != "" {
            date {
                match => ["timestamp", "MMM dd HH:mm:ss" ]
                on_error => "incorrect_timestamp"
                rebase => true
            }
        }
        if [hostname]!= "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.hostname" => "%{hostname}"
                }
                on_error => "hostname_not_present"
            }
            if not [hostname_not_present] {
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }
        }
        if [grok_json_format_failed] {
            grok {
                match => {
                    "message" => "<\\d+>.* vectra_cef(_(?P<json_log_type>\\w+))? -: CEF:%{INT:version}\\|%{DATA:device_vendor}\\|%{DATA:device_product}\\|%{DATA:device_version}\\|%{DATA:device_event_class_id}\\|(?:%{DATA:event_name}\\||)(?P<severity>Medium|MEDIUM|Low|LOW|HIGH|High|Unknown|%{INT})(?:\\||)%{GREEDYDATA:cef_extension}"
                }
                on_error => "grok_json_format_failed"
                overwrite => [ "json_log_type", "version", "device_event_class_id", "device_product", "device_vendor", "device_version", "severity", "cef_extension", "event_name"]
            }
            if [grok_json_format_failed] and [msg_json_failed] {
                drop {
                    tag => "TAG_MALFORMED_MESSAGE"
                }
            }
            mutate {
                replace => {
                    "is_cef" => "true"
                }
            }
            mutate {
                gsub => ["cef_extension", "(\\\s+)([0-9a-zA-Z_.-]+?)=", "^$2="]
            }

            kv {
                source => "cef_extension"
                field_split => "^"
                value_split => "="
                whitespace => "strict"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra.AI"
                    "event.idm.read_only_udm.metadata.product_name" => "DETECT"
                }
            }
            date {
                match => ["start", "UNIX_MS"]
                on_error => "incorrect_date"
            }
            if [event_name] != "" and [device_event_class_id] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.product_event_type" => "[%{device_event_class_id}] - %{event_name}"
                    }
                }
            }
            else if [device_event_class_id] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.product_event_type" => "%{device_event_class_id}"
                    }
                }
            }
            else if [event_name] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.product_event_type" => "%{event_name}"
                    }
                }
            }
            if [externalId] != "" {
                mutate {
                    rename => {
                        "externalId" => "event.idm.read_only_udm.metadata.product_log_id"
                    }
                }
            }
            if [device_version] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.product_version" => "%{device_version}"
                    }
                }
            }
            if [msg] != "" {
                mutate {
                    gsub => ["msg","'{",'{']
                }
                mutate {
                    gsub => ["msg","}'",'}']
                }
                mutate {
                    gsub => ["msg",'\\\"{','{']
                }
                mutate {
                    gsub => ["msg",'}\\\"','}']
                }
                mutate {
                    gsub => ["msg","\\'",'\"']
                }
                json {
                    source => "msg"
                    array_function => "split_columns"
                    on_error => "msg_json_failed"
                }
            }
            if [cat] != "" {
                mutate {
                    merge => {
                        "security_result.category_details" => "cat"
                    }
                }
            }
            if [dvchost] != "" {
                mutate {
                    rename => {
                        "dvchost" => "event.idm.read_only_udm.observer.hostname"
                    }
                }
            }
            if [dvc] != "" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.observer.ip" => "dvc"
                    }
                }
            }
            if [src] != "" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "src"
                        "event.idm.read_only_udm.principal.asset.ip" => "src"
                    }
                    on_error => "invalid_ip"
                }
                if not [invalid_ip] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }
            if [shost] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.hostname" => "%{shost}"
                        "event.idm.read_only_udm.principal.asset.hostname" => "%{shost}"
                    }
                    on_error => "invalid_hostname"
                }
                if not [invalid_hostname] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }
            if [dst] != "" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.ip" => "dst"
                        "event.idm.read_only_udm.target.asset.ip" => "dst"
                    }
                    on_error => "invalid_dst"
                }
                if not [invalid_dst] {
                    mutate {
                        replace => {
                            "target_present" => "true"
                        }
                    }
                }
            }
            if [dhost] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.hostname" => "%{dhost}"
                        "event.idm.read_only_udm.target.asset.hostname" => "%{dhost}"
                    }
                    on_error => "invalid_hostname"
                }
                if not [invalid_hostname] {
                    mutate {
                        replace => {
                            "target_present" => "true"
                        }
                    }
                }
            }
            if [quadrant] != "" {
                mutate {
                    replace => {
                        "security_result.priority_details" => "%{quadrant}"
                    }
                    on_error => "quadrant_value_empty"
                }
            }
            if [suser] =~ "^.+@.+$" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.user.email_addresses" => "suser"
                    }
                    on_error => "invalid_email"
                }
                if not [invalid_email] {
                    mutate {
                        replace => {
                            "user_present" => "true"
                        }
                    }
                }
            }
            else if [suser] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.user.userid" => "%{suser}"
                    }
                    on_error => "invalid_user"
                }
                if not [invalid_user] {
                    mutate {
                        replace => {
                            "user_present" => "true"
                        }
                    }
                }
            }
            mutate {
                replace => {
                    "protocol_number_src" => "%{proto}"
                }
                on_error => "proto_key_not_present"
            }
            if ![proto_key_not_present] {
                @include["parse_ip_protocol.include"]
                if [ip_protocol_out] != "" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.network.ip_protocol" => "%{ip_protocol_out}"
                        }
                    }
                }
            }
            if [dpt] != "" {
                mutate {
                    convert => {
                        "dpt" => "string"
                    }
                    on_error => "already_string"
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.port" => "%{dpt}"
                    }
                }
                mutate {
                    convert => {
                        "event.idm.read_only_udm.target.port" => "integer"
                    }
                }
            }
            if [cs4] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.url" => "%{cs4}"
                    }
                }
            }
            if [out] != "" {
                mutate {
                    convert => {
                        "out" => "string"
                    }
                    on_error => "out_bytes_already_string"
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.sent_bytes" => "%{out}"
                    }
                }
                mutate {
                    convert => {
                        "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
                    }
                }
            }
            if [in] != "" {
                mutate {
                    convert => {
                        "in" => "string"
                    }
                    on_error => "in_rcvd_already_string"
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.received_bytes" => "%{in}"
                    }
                }
                mutate {
                    convert => {
                        "event.idm.read_only_udm.network.received_bytes" => "uinteger"
                    }
                }
            }
            if [cs5] not in ["", "False", "false"] {
                mutate {
                    replace => {
                        "event.idm.is_alert" => "true"
                    }
                }
                mutate {
                    convert => {
                        "event.idm.is_alert" => "boolean"
                    }
                }
            }
            if [cs5] != "" {
                mutate {
                    replace => {
                        "additional_triaged.key" => "triaged"
                        "additional_triaged.value.string_value" => "%{cs5}"
                    }
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "additional_triaged"
                    }
                }
            }
            mutate {
                convert => {
                    "flexNumber1" => uinteger
                }
                on_error => "convert_failed"
            }
            if ![convert_failed] or [flexNumber1] != "" {
                if [flexNumber1] < 101 {
                    mutate {
                        replace => {
                            "security_result.severity" => "LOW"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "flexNumber2" => uinteger
                }
                on_error => "convert_failed"
            }
            if ![convert_failed] or [flexNumber2] != "" {
                if [flexNumber2] < 30 {
                    mutate {
                        replace => {
                            "security_result.confidence" => "LOW_CONFIDENCE"
                        }
                    }
                }
                else if [flexNumber2] < 99 {
                    mutate {
                        replace => {
                            "security_result.confidence" => "HIGH_CONFIDENCE"
                        }
                    }
                }
            }
            if [severity] != "" {
                mutate {
                    replace => {
                        "security_result.severity_details" => "%{severity}"
                    }
                    on_error => "severity_details_not_present"
                }
            }
            if ([src] != "" or [shost] != "") and ([dst] != "" or [dhost] != "") {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
                        "event_type" => "NETWORK_HTTP"
                    }
                }
            }
            else if [src] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
                        "event_type" => "STATUS_UPDATE"
                    }
                }
            }
            else if [user_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
                        "event_type" => "USER_UNCATEGORIZED"
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
                        "event_type" => "GENERIC_EVENT"
                    }
                }
            }
            if [dpt] == "80" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.application_protocol" => "HTTP"
                    }
                }
            }
            else if [dpt] == "443" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.application_protocol" => "HTTPS"
                    }
                }
            }
            else if [dpt] != "" and ([principal_present] == "true" and [target_present] == "true") {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.application_protocol" => "UNKNOWN_APPLICATION_PROTOCOL"
                        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
                        "event_type" => "NETWORK_CONNECTION"
                    }
                }
            }
        }
        else {
            # Pull fields out of raw log.
            json {
                source => "vectra_json"
                array_function => "split_columns"
                on_error => "not_json"
            }
            if [not_json] && [is_cef] == "false" && [grok_json_format_failed] {
                drop {
                    tag => "TAG_MALFORMED_MESSAGE"
                }
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra.AI"
                    "event.idm.read_only_udm.metadata.product_name" => "DETECT"
                    "event_type" => "STATUS_UPDATE"
                }
            }

            # Parse date.
            if [vectra_timestamp] != "" {
                date {
                    match => ["vectra_timestamp", "RFC3339", "UNIX", "ISO8601" ]
                    on_error => "incorrect_date"
                }
            }

            if [certainty] != "" {
                mutate {
                    convert => {
                        "certainty" => "string"
                    }
                    on_error => "certainty_not_string"
                }
                mutate {
                    replace => {
                        "certainty_label.value.string_value" => "%{certainty}"
                        "certainty_label.key" => "certainty"
                    }
                    on_error => "certainty_label_not_present"
                }
                if ![certainty_label_not_present] {
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.additional.fields" => "certainty_label"
                        }
                        on_error => "certainty_label_not_found"
                    }
                }
            }

            #For HOST Events
            if [category] == "HOST SCORING" {
                # Set correct types, set static field, and move values into output proto.

                if [threat] != "" {
                    mutate {
                        convert => {
                            "threat" => "string"
                        }
                        on_error => "threat_not_string"
                    }
                    mutate {
                        replace => {
                            "threat_label.value.string_value" => "%{threat}"
                            "threat_label.key" => "threat"
                        }
                        on_error => "threat_label_not_present"
                    }
                    if ![threat_label_not_present] {
                        mutate {
                            merge => {
                                "event.idm.read_only_udm.additional.fields" => "threat_label"
                            }
                            on_error => "threat_label_not_merged"
                        }
                    }
                }

                if [score_decreases] != "" {
                    mutate {
                        convert => {
                            "score_decreases" => "string"
                        }
                        on_error => "score_decreases_not_integer"
                    }
                    mutate {
                        replace => {
                            "score_decreases_label.value.string_value" => "%{score_decreases}"
                            "score_decreases_label.key" => "score_decreases"
                        }
                        on_error => "score_decreases_label_not_present"
                    }
                    if ![score_decreases_label_not_present] {
                        mutate {
                            merge => {
                                "event.idm.read_only_udm.additional.fields" => "score_decreases_label"
                            }
                            on_error => "score_decreases_label_not_found"
                        }
                    }
                }


                mutate {
                    convert => {
                        "certainty" => "uinteger"
                        "threat" => "uinteger"
                        "host_id" => "string"
                    }
                    on_error => "convert_failed"
                }

                if [host_name] != "" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.hostname" => "%{host_name}"
                            "event.idm.read_only_udm.principal.asset.hostname" => "%{host_name}"
                            "principal_present" => "true"
                        }
                    }
                }
                if [dvchost] != "" {
                    mutate {
                        rename => {
                            "dvchost" => "event.idm.read_only_udm.observer.hostname"
                        }
                    }
                }

                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "SCAN_HOST"
                        "event.idm.read_only_udm.target.asset_id" => "VectraAI.DETECT:%{host_id}"
                        "event_type" => "SCAN_HOST"
                    }
                    on_error => "no_host_id"
                }
                if [certainty] != "" {
                    if ([certainty] >= 0) and ([certainty] <=35) {
                        mutate {
                            replace => {
                                "security_result.confidence" => "LOW_CONFIDENCE"
                            }
                        }
                    }
                    else if ([certainty] > 35) and ([certainty] <=70) {
                        mutate {
                            replace => {
                                "security_result.confidence" => "MEDIUM_CONFIDENCE"
                            }
                        }
                    }
                    else if ([certainty] > 70) and ([certainty] <=100) {
                        mutate {
                            replace => {
                                "security_result.confidence" => "HIGH_CONFIDENCE"
                            }
                        }
                    }
                }
                if [threat] != "" {
                    if ([threat] >= 0) and ([threat]<= 20) {
                        mutate {
                            replace => {
                                "security_result.severity" => "INFORMATIONAL"
                            }
                        }
                    }

                    else if ([threat] > 20) and ([threat]<= 40) {
                        mutate {
                            replace => {
                                "security_result.severity" => "LOW"
                            }
                        }
                    }

                    else if ([threat] > 40) and ([threat]<= 60) {
                        mutate {
                            replace => {
                                "security_result.severity" => "MEDIUM"
                            }
                        }
                    }

                    else if ([threat] > 60) and ([threat]<= 80) {
                        mutate {
                            replace => {
                                "security_result.severity" => "HIGH"
                            }
                        }
                    }

                    else if ([threat] > 80) and ([threat]<= 100) {
                        mutate {
                            replace => {
                                "security_result.severity" => "CRITICAL"
                            }
                        }
                    }
                }

                if [host_ip] != "" {
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.principal.ip" => "host_ip"
                            "event.idm.read_only_udm.principal.asset.ip" => "host_ip"
                        }
                        on_error => "invalid_ip"
                    }
                    if not [invalid_ip] {
                        mutate {
                            replace => {
                                "principal_present" => "true"
                            }
                        }
                    }
                }
            }#End HOST Events
            #For Campaings Events
            else if [json_log_type] == "campaigns" {
                if [dest_ip] != "" {
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.target.ip" => "dest_ip"
                            "event.idm.read_only_udm.target.asset.ip" => "dest_ip"
                        }
                        on_error => "invalid_ip"
                    }
                    if not [invalid_ip] {
                        mutate {
                            replace => {
                                "target_present" => "true"
                            }
                        }
                    }
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "src_ip"
                        "event.idm.read_only_udm.principal.asset.ip" => "src_ip"
                    }
                    on_error => "no_ip"
                }
                if not [no_ip] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
                if [dest_name] != "" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.hostname" => "%{dest_name}"
                            "event.idm.read_only_udm.target.asset.hostname" => "%{dest_name}"
                            "target_present" => "true"
                        }
                    }
                }
                if [log_type] == "campaigns" {
                    drop {
                        tag => "TAG_MALFORMED_MESSAGE"
                    }
                }
            } #End Campaign Events
            #For Detections Events
            else if [category] in ["COMMAND & CONTROL", "BOTNET ACTIVITY",
            "RECONNAISSANCE", "LATERAL MOVEMENT", "EXFILTRATION", "INFO"] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.ip" => "dd_dst_ip"
                        "event.idm.read_only_udm.target.asset.ip" => "dd_dst_ip"
                    }
                    on_error => "no_dd_dst_ip"
                }
                if not [no_dd_dst_ip] {
                    mutate {
                        replace => {
                            "target_present" => "true"
                        }
                    }
                }
                if [host_ip] != "" {
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.principal.ip" => "host_ip"
                            "event.idm.read_only_udm.principal.asset.ip" => "host_ip"
                        }
                        on_error => "invalid_ip"
                    }
                    if not [invalid_ip] {
                        mutate {
                            replace => {
                                "principal_present" => "true"
                            }
                        }
                    }
                }
                else if [headend_addr] != "" {
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.principal.ip" => "headend_addr"
                            "event.idm.read_only_udm.principal.asset.ip" => "headend_addr"
                        }
                        on_error => "invalid_ip"
                    }
                    if not [invalid_ip] {
                        mutate {
                            replace => {
                                "principal_present" => "true"
                            }
                        }
                    }
                }

                if [host_ip] != "" and ([principal_present] == "true" and [target_present] == "true") {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
                            "event_type" => "NETWORK_HTTP"
                        }
                    }
                }
                else if [principal_present] == "true" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
                            "event_type" => "STATUS_UPDATE"
                        }
                    }
                }
                if [dd_dst_port] != "" {
                    mutate {
                        convert => {
                            "dd_dst_port" => "string"
                        }
                    }
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.port" => "%{dd_dst_port}"
                        }
                    }
                    mutate {
                        convert => {
                            "event.idm.read_only_udm.target.port" => "integer"
                        }
                    }
                }

                if [triaged] {
                    mutate {
                        replace => {
                            "event.idm.is_alert" => "true"
                        }
                    }
                    mutate {
                        convert => {
                            "event.idm.is_alert" => "boolean"
                        }
                    }
                }

                mutate {
                    convert => {
                        "severity" => "string"
                    }
                    on_error => "already_string"
                }

                if [severity] != "" {
                    mutate {
                        replace => {
                            "security_result.severity_details" => "%{severity}"
                        }
                        on_error => "no_severity"
                    }
                }

                mutate {
                    convert => {
                        "dd_dst_port" => "uinteger"
                    }
                }
                if [dd_dst_port] == 80 {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.network.application_protocol" => "HTTP"
                        }
                    }
                }
                else if [dd_dst_port] == 443 {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.network.application_protocol" => "HTTPS"
                        }
                    }
                }
                else if [principal_present] == "true" and [target_present] == "true" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.network.application_protocol" => "UNKNOWN_APPLICATION_PROTOCOL"
                            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
                            "event_type" => "NETWORK_CONNECTION"
                        }
                    }
                }

                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.hostname" => "%{dd_dst_dns}"
                        "event.idm.read_only_udm.target.asset.hostname" => "%{dd_dst_dns}"
                        "target_present" => "true"
                    }
                }
                mutate {
                    merge => {
                        "dstDevice.ip_addresses" => "dd_dst_ip"
                    }
                }
                mutate {
                    replace => {
                        "srcDevice.hostname" => "%{host_name}"
                        "event.idm.read_only_udm.network.http.method" => "METHOD_OTHER"
                    }
                }
            }
            #End Detection Events
