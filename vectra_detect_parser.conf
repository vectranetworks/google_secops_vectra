        mutate {
            convert => {
                "payload_printable" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "payload_printable_label.value.string_value" =>
                "%{payload_printable}"
            }
            on_error => "payload_printable_missing"
        }
        if !([payload_printable_missing])
        and [payload_printable_label][value][string_value] !="" {
            mutate {
                replace => {
                    "payload_printable_label.key" => "payload_printable"
                }
                on_error => "payload_printable_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "payload_printable_label"
                }
                on_error => "payload_printable_not_merge"
            }
        }

        mutate {
            convert => {
                "payload" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "payload_label.value.string_value" =>
                "%{payload}"
            }
            on_error => "payload_missing"
        }
        if !([payload_missing]) and [payload_label][value][string_value] !="" {
            mutate {
                replace => {
                    "payload_label.key" => "payload"
                }
                on_error => "payload_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "payload_label"
                }
                on_error => "payload_not_merge"
            }
        }

        mutate {
            convert => {
                "pkt_src" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "pkt_src_label.value.string_value" =>
                "%{pkt_src}"
            }
            on_error => "pkt_src_missing"
        }
        if !([pkt_src_missing]) and [pkt_src_label][value][string_value] !="" {
            mutate {
                replace => {
                    "pkt_src_label.key" => "pkt_src"
                }
                on_error => "pkt_src_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "pkt_src_label"
                }
                on_error => "pkt_src_not_merge"
            }
        }

        mutate {
            convert => {
                "stream" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "stream_label.value.string_value" =>
                "%{stream}"
            }
            on_error => "stream_missing"
        }
        if !([stream_missing]) and [stream_label][value][string_value] !="" {
            mutate {
                replace => {
                    "stream_label.key" => "stream"
                }
                on_error => "stream_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "stream_label"
                }
                on_error => "stream_not_merge"
            }
        }

        mutate {
            convert => {
                "tunnel.depth" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "tunnel_depth_label.value.string_value" =>
                "%{tunnel.depth}"
            }
            on_error => "tunnel_depth_missing"
        }
        if !([tunnel_depth_missing])
        and [tunnel_depth_label][value][string_value] !="" {
            mutate {
                replace => {
                    "tunnel_depth_label.key" => "tunnel_depth"
                }
                on_error => "tunnel_depth_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "tunnel_depth_label"
                }
                on_error => "tunnel_depth_not_merge"
            }
        }

        mutate {
            convert => {
                "tunnel_pkt_src.depth" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "tunnel_pkt_src_label.value.string_value" =>
                "%{tunnel.pkt_src}"
            }
            on_error => "tunnel_pkt_src_missing"
        }
        if !([tunnel_pkt_src_missing])
        and [tunnel_pkt_src_label][value][string_value] !="" {
            mutate {
                replace => {
                    "tunnel_pkt_src_label.key" => "tunnel_pkt_src"
                }
                on_error => "tunnel_pkt_src_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "tunnel_pkt_src_label"
                }
                on_error => "tunnel_pkt_src_not_merge"
            }
        }

        mutate {
            rename => {
                "event.idm.read_only_udm.observer" => "observer"
            }
        }
        if [principal_present] == "true" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
                    "SCAN_NETWORK"
                }
            }
        }

        mutate {
            replace => {
                "log_type_lable.key" => "log_type"
                "log_type_lable.value.string_value" => "Match"
            }
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.additional.fields" => "log_type_lable"
            }
        }
    }
    # Audit
    else {
        mutate {
            replace => {
                "target_present" => "false"
            }
        }
        # metadata
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.description" => "%{msg}"
            }
            on_error => "message_field_not_found"
        }

        mutate {
            convert => {
                "vectra_timestamp" => "string"
            }
            on_error => "_"
        }
        date {
            match => ["vectra_timestamp", "UNIX", "UNIX_MS"]
            target => "event.idm.read_only_udm.metadata.event_timestamp"
            on_error => "vectra_timestamp_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_name" => "Detect"
            }
        }

        mutate {
            convert => {
                "version" => "string"
            }
            on_error => "_"
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_version" =>
                "%{version}"
            }
            on_error => "version_missing"
        }



        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
            }
        }

        # principal
        mutate {
            convert => {
                "source_ip" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "temp_source_ip" => "%{source_ip}"
            }
            on_error => "source_ip_missing"
        }
        mutate {
            convert => {
                "temp_source_ip" => "ipaddress"
            }
            on_error => "source_ip_not_convert"
        }
        if ![source_ip_not_convert] {
            if ![message_field_not_found] and [msg] =~ "log in" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.ip" => "source_ip"
                    }
                    on_error => "source_ip_not_string"
                }
                if ![source_ip_not_string] {
                    mutate {
                        replace => {
                            "target_present" => "true"
                        }
                    }
                }
            }
            else {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "source_ip"
                    }
                    on_error => "source_ip_not_string"
                }
            }
        }

        mutate {
            replace => {
                "user_roles.name" => "%{role}"
            }
            on_error => "role_field_missing"
        }
        if ![message_field_not_found] and [msg] =~ "log in" {
            mutate {
                merge => {
                    "event.idm.read_only_udm.target.user.attribute.roles" =>
                    "user_roles"
                }
                on_error => "user_roles_not_merge"
            }
        }
        else {
            mutate {
                merge => {
                    "event.idm.read_only_udm.principal.user.attribute.roles" =>
                    "user_roles"
                }
                on_error => "user_roles_not_merge"
            }
        }

        if ![message_field_not_found] and [msg] =~ "log in" {

            mutate {
                replace => {
                    "event.idm.read_only_udm.target.user.user_display_name" =>
                    "%{user}"
                }
                on_error => "user_missing"
            }
            if ![user_missing] {
                mutate {
                    replace => {
                        "target_present" => "true"
                    }
                }
            }
        }
        else {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.user.user_display_name" =>
                    "%{user}"
                }
                on_error => "user_missing"
            }
        }
        # observer
        mutate {
            replace => {
                "event.idm.read_only_udm.observer.hostname" => "%{dvchost}"
            }
            on_error => "dvchost_missing"
        }

        mutate {
            convert => {
                "headend_addr" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "temp_headend_addr" => "%{headend_addr}"
            }
            on_error => "headend_addr_missing"
        }
        mutate {
            convert => {
                "temp_headend_addr" => "ipaddress"
            }
            on_error => "headend_addr_not_convert"
        }
        if ![headend_addr_not_convert] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.observer.ip" => "headend_addr"
                }
                on_error => "headend_addr_not_string"
            }
        }

        # security_result
        mutate {
            convert => {
                "result" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "result_label.value" => "%{result}"
            }
            on_error => "result_field_missing"
        }
        if ![result_field_missing] and [result_label][value] != "" {
            mutate {
                replace => {
                    "result_label.key" => "result"
                }
                on_error => "result_key_missing"
            }
            mutate {
                merge => {
                    "security_result.detection_fields" => "result_label"
                }
                on_error => "result_label_missing"
            }
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.security_result" => "security_result"
            }
            on_error => "security_result_not_merge"
        }

        if ![message_field_not_found] and [msg] =~ "log in"
        and [target_present] == "true" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
                    "USER_LOGIN"
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.extensions.auth.auth_details" =>
                    "%{msg}"
                }
                on_error => "message_field2_not_found"
            }
        }
        if ![message_field_not_found] and [msg] =~ "authentication token" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
                    "USER_RESOURCE_ACCESS"
                }
            }
        }
        mutate {
            replace => {
                "log_type_lable.key" => "log_type"
                "log_type_lable.value.string_value" => "Audit"
            }
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.additional.fields" => "log_type_lable"
            }
        }

    }
    mutate {
        merge => {
            "@output" = "event"
        }
        on_error => "event_not_merge"
    }
}