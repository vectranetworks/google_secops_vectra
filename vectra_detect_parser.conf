                "user_present" => "false"
                "principal_present" => "false"
                "target_present" => "false"
                "event_type" => "GENERIC_EVENT"
                "msg" => ""
                "detection_profile.name" => ""
                "detection_profile.vname" => ""
                "detection_profile.scoringDetections" => ""
