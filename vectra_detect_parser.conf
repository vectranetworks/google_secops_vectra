        # Audit
        else {
            mutate {
                replace => {
                    "target_present" => "false"
                    "principal_present" => "false"
                }
            }
            # metadata
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{msg}"
                }
                on_error => "message_field_not_found"
            }

            mutate {
                convert => {
                    "vectra_timestamp" => "string"
                }
                on_error => "_"
