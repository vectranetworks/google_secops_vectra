# Product: Vectra Detect
# Category: NDR
# Supported Format: JSON
# Reference: https://support.vectra.ai/s/article/KB-VS-1233
# Last Updated: 2025-02-07

filter {
    mutate {
        gsub => ["message", "\\r\\n", ""]
    }

    grok {
        match => {
            "message" => "<%{INT}>\\s*(%{TIMESTAMP_ISO8601}|%{SYSLOGTIMESTAMP})\\s*%{HOSTNAME}\\s*%{DATA:log_type}\\s*(-)?:\\s*%{GREEDYDATA:message}"
        }
        overwrite => ["message"]
        on_error => "message_not_match"
    }
    # Audit specific
    mutate {
        gsub => ["message", '(.*)\\"message\\":(.*)', '$1"msg":$2']
    }
    json {
        source => "message"
        array_function => "split_columns"
        on_error => "invalid_json"
    }
    if [invalid_json] {
        drop {
            tag => "TAG_MALFORMED_ENCODING"
        }
    }
    mutate {
        convert => {
            "timestamp" => "string"
        }
        on_error => "timestamp_not_convert"
    }
    mutate {
        convert => {
            "vectra_timestamp" => "string"
        }
        on_error => "vectra_timestamp_not_convert"
    }
    # checking log types
    mutate {
        convert => {
            "d_type_vname" => "string"
        }
        on_error => "_"
    }

    mutate {
        replace => {
            "check_detection_log_type" => "%{d_type_vname}"
        }
        on_error => "is_detection_log_type"
    }

    mutate {
        convert => {
            "category" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_scoring_log_type" => "%{category}"
        }
        on_error => "category_present"
    }

    mutate {
        convert => {
            "type" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_health_log_type" => "%{type}"
        }
        on_error => "type_present"
    }

    mutate {
        convert => {
            "event_type" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_match_log_type" => "%{event_type}"
        }
        on_error => "event_type_present"
    }

    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.event_type" =>
            "GENERIC_EVENT"
        }
    }
    # Detection
    if ![is_detection_log_type] {
        mutate {
            replace => {
                "principal_present" => "false"
                "target_present" => "false"
                "principal_user_present" => "false"
            }
        }
        mutate {
            convert => {
                "vectra_timestamp" => "string"
            }
            on_error => "vectra_timestamp_not_convert"
        }
        date {
            match => ["vectra_timestamp", "UNIX", "UNIX_MS" ]
            on_error => "vectra_timestamp_not_valid"
        }
        mutate {
            convert => {
                "response_code" => "string"
            }
            on_error => "response_code_not_convert"
        }
        mutate {
            replace => {
                "response_code" => "%{response_code}"
            }
            on_error => "response_code_missing"
        }

        if [d_type_vname] =~ "Suspicious LDAP Query" {
            if ![response_code_missing] and [response_code] == "success" {
                mutate {
                    replace => {
                        "action_temp" => "ALLOW"
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "action_temp"
                    }
                    on_error => "security_result_temp_action_not_merge"
                }
            }
            else if ![response_code_missing] and [response_code] == "failure" {
                mutate {
                    replace => {
                        "action_temp" => "FAIL"
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "action_temp"
                    }
                    on_error => "security_result_temp_action_not_merge"
                }
            }
            mutate {
                replace => {
                    "security_result_temp.action_details" => "%{response_code}"
                }
                on_error => "response_code_missing"
            }
        }
        else {
            mutate {
                replace => {
                    "event.idm.read_only_udm.network.http.response_code" =>
                    "%{response_code}"
                }
                on_error => "response_code_missing"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.network.http.response_code" =>
                    "integer"
                }
                on_error => "response_code_not_convert"
            }
            if [response_code_not_convert] {
                mutate {
                    remove_field =>
                    ["event.idm.read_only_udm.network.http.response_code"]
                }
            }
        }

        if [d_type_vname] =~ "Suspicious Remote Desktop" {
            mutate {
                convert => {
                    "reason" => "string"
                }
                on_error => "reason_not_convert"
            }
            mutate {
                replace => {
                    "security_result_temp.description" => "%{reason}"
                }
                on_error => "reason_missing"
            }
        }

        if [d_type_vname] =~ "SMB Brute-Force" {
            mutate {
                convert => {
                    "reason" => "string"
                }
                on_error => "reason_not_convert"
            }
            mutate {
                replace => {
                    "reason_label.value" => "%{reason}"
                }
                on_error => "reason_missing"
            }
            if ![reason_missing] and [reason_label][value] != "" {
                mutate {
                    replace => {
                        "reason_label.key" => "reason"
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.detection_fields" =>
                        "reason_label"
                    }
                    remove_field => ["reason_label"]
                }
            }
        }
        mutate {
            replace => {
                "category" => "%{category}"
            }
            on_error => "category_missing"
        }
        mutate {
            replace => {
                "category_temp" => ""
            }
        }
        if ![category_missing] and ([category] =~ "(?i)COMMAND & CONTROL"
        or [category] =~ "(?i)COMMAND_AND_CONTROL") {
            mutate {
                replace => {
                    "category_temp" => "NETWORK_COMMAND_AND_CONTROL"
                }
            }
        }
        else if ![category_missing] and ([category] =~ "(?i)BOTNET ACTIVITY"
        or [category] =~ "(?i)BOTNET_ACTIVITY") {
            mutate {
                replace => {
                    "category_temp" => "NETWORK_MALICIOUS"
                }
            }
        }
        else if ![category_missing] and [category] =~ "(?i)EXFILTRATION" {
            mutate {
                replace => {
                    "category_temp" => "DATA_EXFILTRATION"
                }
            }
        }
        else if ![category_missing] and ([category] =~ "(?i)LATERAL MOVEMENT"
        or [category] =~ "(?i)LATERAL_MOVEMENT") {
            mutate {
                replace => {
                    "category_temp" => "ACL_VIOLATION"
                }
            }
        }
        else if ![category_missing] and [category] =~ "(?i)RECONNAISSANCE" {
            mutate {
                replace => {
                    "category_temp" => "NETWORK_RECON"
                }
            }
        }
        else {
            mutate {
                replace => {
                    "category_temp" => "UNKNOWN_CATEGORY"
                }
            }
        }
        mutate {
            merge => {
                "security_result_temp.category" => "category_temp"
            }
            on_error => "category_temp_not_merge"
        }
        mutate {
            merge => {
                "security_result_temp.category_details" => "category"
            }
            on_error => "security_result_temp_category_details_not_merge"
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_event_type" =>
                "%{d_type_vname}"
            }
            on_error => "d_type_vname_not_string"
        }

        mutate {
            convert => {
                "detection_id" => "string"
            }
            on_error => "detection_id_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_log_id" =>
                "%{detection_id}"
            }
            on_error => "detection_id_missing"
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_name" => "Detect"
            }
        }

        mutate {
            convert => {
                "version" => "string"
            }
            on_error => "version_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_version" =>
                "%{version}"
            }
            on_error => "version_missing"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
            }
        }

        mutate {
            convert => {
                "service_name" => "string"
            }
            on_error => "service_name_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.application" =>
                "%{service_name}"
            }
            on_error => "service_name_missing"
        }

        mutate {
            convert => {
                "host_name" => "string"
            }
            on_error => "host_name_not_convert"
        }
        mutate {
            replace => {
                "host_name" => "%{host_name}"
            }
            on_error => "host_name_missing"
        }
        if ![host_name_missing] {
            if [host_name] =~ "(^.{0,256}$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.hostname" =>
                        "%{host_name}"
                    }
                    on_error => "host_name_not_string"
                }
                if ![host_name_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }
        }

        mutate {
            convert => {
                "host_ip" => "string"
            }
            on_error => "host_ip_not_convert"
        }
        mutate {
            replace => {
                "_host_ip" => "%{host_ip}"
            }
            on_error => "host_ip_missing"
        }
        mutate {
            convert => {
                "_host_ip" => "ipaddress"
            }
            on_error => "host_ip_not_convert"
        }
        if ![host_ip_not_convert] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.principal.ip" => "host_ip"
                }
                on_error => "host_ip_not_merge"
            }
            if ![host_ip_not_merge] {
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }
        }

        mutate {
            replace => {
                "var_account_info" => ""
            }
            on_error => "_"
        }
        mutate {
            convert => {
                "account_info" => "string"
            }
            on_error => "account_info_not_convert"
        }
        mutate {
            replace => {
                "var_account_info.value" => "%{account_info}"
            }
            on_error => "account_info_missing"
        }
        if !([account_info_missing]) and [var_account_info][value] != "" {
            mutate {
                replace => {
                    "var_account_info.key" => "account_info"
                }
                on_error => "account_info_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.principal.user.attribute.labels" =>
                    "var_account_info"
                }
                on_error => "account_info_not_merge"
            }
        }

        mutate {
            convert => {
                "account_uid" => "string"
            }
            on_error => "account_uid_not_convert"
        }
        mutate {
            replace => {
                "account_uid" => "%{account_uid}"
            }
            on_error => "account_uid_missing"
        }
        if ![account_uid_missing] {
            if [account_uid] =~ "(^.+@.+$)" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.user.email_addresses" =>
                        "account_uid"
                    }
                    on_error => "account_uid_not_merge"
                }
                if ![account_uid_not_merge] {
                    mutate {
                        replace => {
                            "principal_user_present" => "true"
                        }
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.user.userid" =>
                        "%{account_uid}"
                    }
                    on_error => "account_uid_missing"
                }
                if ![account_uid_missing] {
                    mutate {
                        replace => {
                            "principal_user_present" => "true"
                        }
                    }
                }
            }
        }

        mutate {
            convert => {
                "account_name" => "string"
            }
            on_error => "account_name_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.user.user_display_name" =>
                "%{account_name}"
            }
            on_error => "account_name_missing"
        }

        mutate {
            convert => {
                "proxied_dst" => "string"
            }
            on_error => "proxied_dst_not_convert"
        }
        mutate {
            replace => {
                "_proxied_dst" => "%{proxied_dst}"
            }
            on_error => "proxied_dst_missing"
        }
        if ![proxied_dst_missing] {
            mutate {
                convert => {
                    "_proxied_dst" => "ipaddress"
                }
                on_error => "proxied_dst_not_convert"
            }
            if ![proxied_dst_not_convert] {
                mutate {
                    merge => {
                        "intermediary_temp.ip" => "proxied_dst"
                    }
                    on_error => "proxied_dst_not_string"
                }
            }
            else {
                if [proxied_dst] =~ "(^.{0,256}$)" {
                    mutate {
                        replace => {
                            "intermediary_temp.hostname" => "%{proxied_dst}"
                        }
                        on_error => "proxied_dst_host_missing"
                    }
                }
            }
        }

        mutate {
            convert => {
                "dd_dst_dns" => "string"
            }
            on_error => "dd_dst_dns_not_convert"
        }
        mutate {
            replace => {
                "dd_dst_dns" => "%{dd_dst_dns}"
            }
            on_error => "dd_dst_dns_missing"
        }
        if ![dd_dst_dns_missing] and [dd_dst_dns] =~ "(^.{0,256}$)" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.hostname" => "%{dd_dst_dns}"
                }
                on_error => "dd_dst_dns_missing"
            }
            if ![dd_dst_dns_missing] {
                mutate {
                    replace => {
                        "target_present" => "true"
                    }
                }
            }
        }

        mutate {
            convert => {
                "dd_dst_ip" => "string"
            }
            on_error => "dd_dst_ip_not_convert"
        }
        mutate {
            replace => {
                "_dd_dst_ip" => "%{dd_dst_ip}"
            }
            on_error => "dd_dst_ip_not_present"
        }
        mutate {
            convert => {
                "_dd_dst_ip" => "ipaddress"
            }
            on_error => "dd_dst_ip_not_convert"
        }
        if ![dd_dst_ip_not_convert] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.target.ip" => "dd_dst_ip"
                }
                on_error => "dd_dst_ip_not_string"
            }
            if ![dd_dst_ip_not_string] {
                mutate {
                    replace => {
                        "target_present" => "true"
                    }
                }
            }
        }

        mutate {
            convert => {
                "ip" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "_ip" => "%{ip}"
            }
            on_error => "ip_not_present"
        }
        mutate {
            convert => {
                "_ip" => "ipaddress"
            }
            on_error => "ip_not_convert"
        }
        if ![ip_not_convert] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.target.ip" => "ip"
                }
                on_error => "ip_not_merge"
            }
            if ![ip_not_merge] {
                mutate {
                    replace => {
                        "target_present" => "true"
                    }
                }
            }
        }

        # port
        mutate {
            convert => {
                "port" => "string"
            }
            on_error => "port_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.target.nat_port" => "%{port}"
            }
            on_error => "port_missing"
        }
        mutate {
            convert => {
                "event.idm.read_only_udm.target.nat_port" => "integer"
            }
            on_error => "port_not_convert"
        }
        if [port_not_convert] {
            mutate {
                remove_field => ["event.idm.read_only_udm.target.nat_port"]
            }
        }

        mutate {
            convert => {
                "dd_dst_port" => "string"
            }
            on_error => "dd_dst_port_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.target.port" => "%{dd_dst_port}"
            }
            on_error => "dd_dst_port_missing"
        }
        mutate {
            convert => {
                "event.idm.read_only_udm.target.port" => "integer"
            }
            on_error => "dd_dst_port_not_convert"
        }
        if [dd_dst_port_not_convert] {
            mutate {
                remove_field => ["event.idm.read_only_udm.target.port"]
            }
        }

        mutate {
            convert => {
                "url" => "string"
            }
            on_error => "url_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.target.url" => "%{url}"
            }
            on_error => "url_missing"
        }

        mutate {
            convert => {
                "href" => "string"
            }
            on_error => "href_not_convert"
        }
        mutate {
            replace => {
                "security_result_temp.url_back_to_product" => "%{href}"
            }
            on_error => "href_missing"
        }

        mutate {
            convert => {
                "http_method" => "string"
            }
            on_error => "http_method_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.http.method" =>
                "%{http_method}"
            }
            on_error => "http_method_missing"
        }

        mutate {
            convert => {
                "referer" => "string"
            }
            on_error => "referer_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.http.referral_url" =>
                "%{referer}"
            }
            on_error => "referer_missing"
        }

        mutate {
            convert => {
                "matched_user_agent" => "string"
            }
            on_error => "matched_user_agent_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.http.user_agent" =>
                "%{matched_user_agent}"
            }
            on_error => "network_matched_user_agent_missing"
        }

        mutate {
            convert => {
                "user_agent" => "string"
            }
            on_error => "user_agent_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.http.user_agent" =>
                "%{user_agent}"
            }
            on_error => "network_user_agent_missing"
        }

        mutate {
            convert => {
                "networks" => "string"
            }
            on_error => "networks_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.ip_subnet_range" =>
                "%{networks}"
            }
            on_error => "networks_missing"
        }

        mutate {
            convert => {
                "dst_ips" => "string"
            }
            on_error => "dst_ips_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.ip_subnet_range" =>
                "%{dst_ips}"
            }
            on_error => "dst_ips_missing"
        }

        mutate {
            convert => {
                "dd_bytes_rcvd" => "string"
            }
            on_error => "dd_bytes_rcvd_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.received_bytes" =>
                "%{dd_bytes_rcvd}"
            }
            on_error => "dd_bytes_rcvd_missing"
        }
        mutate {
            convert => {
                "event.idm.read_only_udm.network.received_bytes" => "uinteger"
            }
            on_error => "dd_bytes_rcvd_not_convert"
        }
        if [dd_bytes_rcvd_not_convert] {
            mutate {
                remove_field =>
                ["event.idm.read_only_udm.network.received_bytes"]
            }
        }

        mutate {
            convert => {
                "dd_bytes_sent" => "string"
            }
            on_error => "dd_bytes_sent_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.network.sent_bytes" =>
                "%{dd_bytes_sent}"
            }
            on_error => "dd_bytes_sent_missing"
        }
        mutate {
            convert => {
                "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
            }
            on_error => "dd_bytes_sent_not_convert"
        }
        if [dd_bytes_sent_not_convert] {
            mutate {
                remove_field => ["event.idm.read_only_udm.network.sent_bytes"]
            }
        }

        mutate {
            convert => {
                "dvchost" => "string"
            }
            on_error => "dvchost_not_convert"
        }
        mutate {
            replace => {
                "dvchost" => "%{dvchost}"
            }
            on_error => "dvchost_missing"
        }
        if ![dvchost_missing] and [dvchost] =~ "(^.{0,256}$)" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.observer.hostname" => "%{dvchost}"
                }
                on_error => "dvchost_not_string"
            }
        }

        mutate {
            convert => {
                "headend_addr" => "string"
            }
            on_error => "headend_addr_not_convert"
        }
        mutate {
            replace => {
                "_headend_addr" => "%{headend_addr}"
            }
            on_error => "headend_addr_not_present"
        }
        mutate {
            convert => {
                "_headend_addr" => "ipaddress"
            }
            on_error => "headend_addr_not_convert"
        }
        if ![headend_addr_not_convert] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.observer.ip" => "headend_addr"
                }
                on_error => "headend_addr_not_string"
            }
        }

        mutate {
            convert => {
                "matched_domain" => "string"
            }
            on_error => "matched_domain_not_convert"
        }
        mutate {
            replace => {
                "matched_domain" => "%{matched_domain}"
            }
            on_error => "matched_domain_missing"
        }
        if ![matched_domain_missing] and [matched_domain] =~ "(^.{0,256}$)" {
            mutate {
                replace => {
                    "security_result_temp.about.domain.name" =>
                    "%{matched_domain}"
                }
                on_error => "matched_domain_missing"
            }
        }

        mutate {
            convert => {
                "host" => "string"
            }
            on_error => "host_not_convert"
