            if [category] =~ "(?i)ACCOUNT" and [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "SCAN_UNCATEGORIZED"
                    }
                }
            }
            mutate {
                replace => {
                    "log_type_lable.key" => "log_type"
                    "log_type_lable.value.string_value" => "Scoring"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" => "log_type_lable"
                }
            }
        }
        # Lockdown
        else if ![category_present] and [category] =~ "(?i)LOCKDOWN" {

            mutate {
                replace => {
                    "principal_present" => "false"
                }
            }
            # Metadata
            mutate {
                convert => {
                    "vectra_timestamp" => "string"
                }
                on_error => "vectra_timestamp_not_convert"
            }
            date {
                match => ["vectra_timestamp", "UNIX", "UNIX_MS"]
                on_error => "vectra_timestamp_match_failed"
            }

            mutate {
                convert => {
                    "category" => "string"
                }
                on_error => "category_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" =>
                    "%{category}"
                }
                on_error => "category_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_name" => "Detect"
                }
            }

            mutate {
                convert => {
                    "version" => "string"
                }
                on_error => "version_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_version" =>
                    "%{version}"
                }
                on_error => "version_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
                }
            }

            # Target
            mutate {
                convert => {
                    "host_id" => "string"
                }
                on_error => "host_id_not_convert"
            }
            mutate {
                replace => {
                    "host_id" => "%{host_id}"
                }
                on_error => "host_id_missing"
            }
            # SecOps SIEM requires the asset ID to contain the ":" character.
            # Hence, prefixed it with "Vectra:"
            if ![host_id_missing] {
                if [host_id] =~ "(^.*\\:.*$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.asset_id" =>
                            "%{host_id}"
                        }
                        on_error => "target_asset_id_set_failed"
                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.asset_id" =>
                            "Vectra:%{host_id}"
                        }
                        on_error => "target_asset_id_set_failed"
                    }
                }
            }

            mutate {
                convert => {
                    "host_name" => "string"
                }
                on_error => "host_name_missing"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.hostname" => "%{host_name}"
                }

                on_error => "host_name_missing"
            }

            mutate {
                convert => {
                    "account_uid" => "string"
                }
                on_error => "account_uid_not_convert"
            }
            mutate {
                replace => {
                    "account_uid" => "%{account_uid}"
                }
                on_error => "account_uid_missing"
            }
            if ![account_uid_missing] and [account_uid] =~ "^.+@.+$" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.user.email_addresses" =>
                        "account_uid"
                    }
                    on_error => "target_user_email_address_not_merged"
                }
            }

            mutate {
                convert => {
                    "account_id" => "string"
                }
                on_error => "account_id_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.user.userid" => "%{account_id}"
                }
                on_error => "target_user_id_not_merged"
            }

            # Observer
            mutate {
                convert => {
                    "headend_addr" => "string"
                }
                on_error => "headend_addr_not_convert"
            }
            mutate {
                replace => {
                    "_headend_addr" => "%{headend_addr}"
                }
                on_error => "headend_addr_missing"
            }
            mutate {
                convert => {
                    "_headend_addr" => "ipaddress"
                }
                on_error => "headend_addr_not_convert"
            }
            if ![headend_addr_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.observer.ip" => "headend_addr"
                    }
                    on_error => "headend_addr_missing"
                }
            }

            mutate {
                convert => {
                    "user" => "string"
                }
                on_error => "user_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.observer.user.user_display_name" =>
                    "%{user}"
                }
                on_error => "observer_user_display_name_missing"
            }

            # Security Result
            mutate {
                replace => {
                    "security_result_temp" => ""
                }
            }

            mutate {
                convert => {
                    "action" => "string"
                }
                on_error => "action_not_convert"
            }
            mutate {
                replace => {
                    "action" => "%{action}"
                }
                on_error => "action_missing"
            }

            if ![action_missing] and [action] != "" {
                if [action] == "lock" {
                    mutate {
                        replace => {
                            "action_taken" => "BLOCK"
                        }
                    }
                }
                else if [action] == "unlock" {
                    mutate {
                        replace => {
                            "action_taken" => "ALLOW"
                        }
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "action_taken"
                    }
                    on_error => "security_result_action_not_merged"
                }
                mutate {
                    replace => {
                        "security_result_temp.action_details" => "%{action}"
                    }
                    on_error => "security_result_action_details_missing"
                }
            }

            mutate {
                convert => {
                    "success" => "string"
                }
                on_error => "success_not_convert"
            }
            mutate {
                replace => {
                    "success" => "%{success}"
                }
                on_error => "success_missing"
            }
            if ![success_missing] and [success] != "" {
                mutate {
                    replace => {
                        "success_label.value" => "%{success}"
                    }

                    on_error => "success_label_set_failed"
                }

                if ![success_label_set_failed] {
                    mutate {
                        replace => {
                            "success_label.key" => "success"
                        }
                    }
                    mutate {
                        merge => {
                            "security_result_temp.detection_fields" =>
                            "success_label"
                        }
                        on_error => "security_result_success_label_not_merged"
                    }
                }
            }

            mutate {
                convert => {
                    "will_retry" => "string"
                }
                on_error => "will_retry_not_convert"
            }
            mutate {
                replace => {
                    "will_retry" => "%{will_retry}"
                }
                on_error => "will_retry_missing"
            }
            if ![will_retry_missing] and [will_retry] != "" {
                mutate {
                    replace => {
                        "will_retry_label.value" => "%{will_retry}"
                    }
                    on_error => "will_retry_missing"
                }

                if ![will_retry_missing] and [will_retry] != "" {
                    mutate {
                        replace => {
                            "will_retry_label.key" => "will_retry"
                        }
                    }
                    mutate {
                        merge => {
                            "security_result_temp.detection_fields" =>
                            "will_retry_label"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "href" => "string"
                }
                on_error => "href_not_convert"
            }
            mutate {
                replace => {
                    "security_result_temp.url_back_to_product" => "%{href}"
                }
                on_error => "security_result_url_back_to_product_missing"
            }

            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" =>
                    "security_result_temp"
                }
                on_error => "security_result_not_merged"
            }

            if [category] =~ "(?i)HOST" and [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" => "SCAN_HOST"
                    }
                }
            }
            if [category] =~ "(?i)ACCOUNT" and [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "SCAN_UNCATEGORIZED"
                    }
                }
            }
            mutate {
                replace => {
                    "log_type_lable.key" => "log_type"
                    "log_type_lable.value.string_value" => "Lockdown"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" => "log_type_lable"
                }
            }
        }
        # Health
        else if ![type_present] {
            mutate {
                replace => {
                    "principal_present" => "false"
                }
            }
            mutate {
                convert => {
                    "vectra_timestamp" => "string"
                }
                on_error => "vectra_timestamp_not_convert"
            }
            date {
                match => ["vectra_timestamp", "UNIX", "UNIX_MS" ]
                on_error => "vectra_timestamp_not_valid"
            }

            mutate {
                convert => {
                    "type" => "string"
                }
                on_error => "type_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" =>
                    "%{type}"
                }
                on_error => "type_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_name" => "Detect"
                }
            }

            mutate {
                convert => {
                    "version" => "string"
                }
                on_error => "version_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_version" =>
                    "%{version}"
                }
                on_error => "version_missing"
            }

            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
                }
            }

            mutate {
                convert => {
                    "dvchost" => "string"
                }
                on_error => "dvchost_not_convert"
            }
            mutate {
                replace => {
                    "dvchost" => "%{dvchost}"
                }
                on_error => "dvchost_missing"
            }
            if ![dvchost_missing] and [dvchost] =~ "(^.{0,256}$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.observer.hostname" => "%{dvchost}"
                    }
                    on_error => "dvchost_missing"
                }
            }

            mutate {
                convert => {
                    "headend_addr" => "string"
                }
                on_error => "headend_addr_not_convert"
            }
            mutate {
                replace => {
                    "_headend_addr" => "%{headend_addr}"
                }
                on_error => "headend_addr_not_present"
            }
            mutate {
                convert => {
                    "_headend_addr" => "ipaddress"
                }
                on_error => "headend_addr_not_convert"
            }
            if ![headend_addr_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.observer.ip" => "headend_addr"
                    }
                    on_error => "headend_addr_not_merged"
                }
            }

            mutate {
                convert => {
                    "result" => "string"
                }
                on_error => "result_not_convert"
            }
            mutate {
                replace => {
                    "result" => "%{result}"
                }
                on_error => "result_missing"
            }
            if ![result_missing] and [result] == "success" {
                mutate {
                    replace => {
                        "ALLOW_temp" => "ALLOW"
                    }
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "ALLOW_temp"
                    }
                    on_error => "security_result_temp_action_not_merge"
                }
            }
            else if ![result_missing] and [result] == "failure" {
                mutate {
                    replace => {
                        "FAIL_temp" => "FAIL"
                    }
                    on_error => "FAIL"
                }
                mutate {
                    merge => {
                        "security_result_temp.action" => "FAIL_temp"
                    }
                    on_error => "security_result_temp_action_not_merge"
                }
            }
            mutate {
                replace => {
                    "security_result_temp.action_details" => "%{result}"
                }
                on_error => "result_missing"
            }

            mutate {
                convert => {
                    "message" => "string"
                }
                on_error => "message_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{msg}"
                }
                on_error => "message_missing"
            }

            mutate {
                convert => {
                    "source_ip" => "string"
                }
                on_error => "source_ip_not_convert"
            }
            mutate {
                replace => {
                    "_source_ip" => "%{source_ip}"
                }
                on_error => "source_ip_not_convert"
            }
            mutate {
                convert => {
                    "_source_ip" => "ipaddress"
                }
                on_error => "source_ip_not_convert"
            }
            if ![source_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "source_ip"
                    }
                    on_error => "source_ip_not_merge"
                }
                if ![source_ip_not_merge] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }

            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" =>
                    "security_result_temp"
                }
                on_error => "event_idm_read_only_udm_security_result_not_merge"
            }

            if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "STATUS_UPDATE"
                    }
                }
            }
            mutate {
                replace => {
                    "log_type_lable.key" => "log_type"
                    "log_type_lable.value.string_value" => "Health"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" => "log_type_lable"
                }
            }
        }
        # Match
        else if ![event_type_present] {
            mutate {
                replace => {
                    "principal_present" => "false"
                }
            }
            # metadata
            mutate {
                convert => {
                    "timestamp" => "string"
                }
                on_error => "_"
            }
            date {
                match => ["timestamp", "UNIX", "UNIX_MX","ISO8601"]
                target => "event.idm.read_only_udm.metadata.event_timestamp"
                on_error => "timestamp_field_not_convert"
            }
            mutate {
                convert => {
                    "event_type" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" =>
                    "%{event_type}"
                }
                on_error => "event_type_not_found"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_name" => "Detect"
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
                }
            }
            # principal
            mutate {
                convert => {
                    "vectra.orig_huid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "vectra_orig_huid" => "%{vectra.orig_huid}"
                }
                on_error => "vectra_orig_huid_missing"
            }
            if ![vectra_orig_huid_missing] and [vectra][orig_huid] != "" {
                if [vectra][orig_huid] =~ "(^.*\:.*$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.asset_id" =>
                            "%{vectra.orig_huid}"
                        }
                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.principal.asset_id" =>
                            "Vectra:%{vectra.orig_huid}"
                        }
                    }
                }
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }

            mutate {
                convert => {
                    "vectra.orig_hostname" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.hostname" =>
                    "%{vectra.orig_hostname}"
                }
                on_error => "vectra_orig_hostname_not_found"
            }
            if ![vectra_orig_hostname_not_found] {
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }
            mutate {
                convert => {
                    "src_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_src_ip" => "%{src_ip}"
                }
                on_error => "src_ip_missing"
            }
            mutate {
                convert => {
                    "temp_src_ip" => "ipaddress"
                }
                on_error => "src_ip_not_convert"
            }
            if ![src_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "src_ip"
                    }
                    on_error => "src_ip_not_string"
                }
                if ![src_ip_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "flow.src_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_flow_src_ip" => "%{flow.src_ip}"
                }
                on_error => "flow_src_ip_missing"
            }
            mutate {
                convert => {
                    "temp_flow_src_ip" => "ipaddress"
                }
                on_error => "flow_src_ip_not_convert"
            }
            if ![flow_src_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "flow.src_ip"
                    }
                    on_error => "flow_src_ip_not_string"
                }
                if ![flow_src_ip_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "src_port" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.port" => "%{src_port}"
                }
                on_error => "src_port_missing"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.principal.port" => "integer"
                }
                on_error => "src_port_not_convert"
            }
            if [src_port_not_convert] {
                mutate {
                    remove_field => ["event.idm.read_only_udm.principal.port"]
                }
                mutate {
                    convert => {
                        "flow.src_port" => "string"
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.port" =>
                        "%{flow.src_port}"
                    }
                    on_error => "flow_src_port_missing"
                }
                mutate {
                    convert => {
                        "event.idm.read_only_udm.principal.port" => "integer"
                    }
                    on_error => "flow_src_port_not_convert"
                }
                if [flow_src_port_not_convert] {
                    mutate {
                        remove_field => ["event.idm.read_only_udm.principal.port"]
                    }
                }
            }


            mutate {
                convert => {
                    "vectra.orig_sluid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "attribute_labels.value" => "%{vectra.orig_sluid}"
                }
                on_error => "vectra_orig_sluid_missing"
            }
            if ![vectra_orig_sluid_missing] and [attribute_labels][value] != "" {
                mutate {
                    replace => {
                        "attribute_labels.key" => "vectra_orig_sluid"
                    }
                    on_error => "vectra_orig_sluid_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.asset.attribute.labels" =>
                        "attribute_labels"
                    }
                    on_error => "attribute_labels_missing"
                }
            }
            # intermediary

            mutate {
                convert => {
                    "tunnel.src_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_tunnel_src_ip" => "%{tunnel.src_ip}"
                }
                on_error => "tunnel_src_ip_missing"
            }
            mutate {
                convert => {
                    "temp_tunnel_src_ip" => "ipaddress"
                }
                on_error => "tunnel_src_ip_not_convert"
            }
            if ![tunnel_src_ip_not_convert] {
                mutate {
                    merge => {
                        "intermediary_temp.ip" => "tunnel.src_ip"
                    }
                    on_error => "tunnel_src_ip_not_string"
                }
            }

            mutate {
                convert => {
                    "tunnel.src_port" => "integer"
                }
                on_error => "tunnel_src_port_not_convert"
            }
            if ![tunnel_src_port_not_convert] {
                mutate {
                    rename => {
                        "tunnel.src_port" => "intermediary_temp.port"
                    }
                }
            }

            mutate {
                convert => {
                    "tunnel.proto" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "protocol_number_src" => "%{tunnel.proto}"
                }
                on_error => "no_protocol"
            }
            mutate {
                convert => {
                    "protocol_number_src" => "integer"
                }
                on_error => "tunnel_not_converted"
            }
            mutate {
                rename => {
                    "tunnel.proto" => "protocol_number_src"
                }
                on_error => "tunnel_protocol_has_value"
            }
            if ![no_protocol] {
                @include["parse_ip_protocol.include"]
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.ip_protocol" =>
                        "%{ip_protocol_out}"
                    }
                    on_error => "ip_protocol_not_rename"
                }
            }
            mutate {
                convert => {
                    "tunnel.dest_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_tunnel_dest_ip" => "%{tunnel.dest_ip}"
                }
                on_error => "tunnel_dest_ip_missing"
            }
            mutate {
                convert => {
                    "temp_tunnel_dest_ip" => "ipaddress"
                }
                on_error => "tunnel_dest_ip_not_convert"
            }
            if ![tunnel_dest_ip_not_convert] {
                mutate {
                    merge => {
                        "intermediary_temp.ip" => "tunnel.dest_ip"
                    }
                    on_error => "tunnel_dest_ip_not_string"
                }
            }

            mutate {
                convert => {
                    "tunnel.dest_port" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "intermediary_temp.port" => "%{tunnel.dest_port}"
                }
                on_error => "tunnel_dest_port_missing"
            }
            mutate {
                convert => {
                    "intermediary_temp.port" => "integer"
                }
                on_error => "tunnel_dest_port_not_convert"
            }
            if [tunnel_dest_port_not_convert] {
                mutate {
                    remove_field => ["intermediary_temp.port"]
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.intermediary" => "intermediary_temp"
                }
                on_error => "event_idm_read_only_udm_intermediary_not_merge"
            }
            # target
            mutate {
                convert => {
                    "vectra.resp_huid" => "string"
                }
                on_error => "_"
            }

            mutate {
                replace => {
                    "vectra_resp_huid" => "%{vectra.resp_huid}"
                }
                on_error => "vectra_resp_huid_missing"
            }

            if ![vectra_resp_huid_missing] and [vectra][resp_huid] != "" {
                if [vectra][resp_huid] =~ "(^.*\:.*$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.asset_id" =>
                            "%{vectra.resp_huid}"
                        }
                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.target.asset_id" =>
                            "Vectra:%{vectra.resp_huid}"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "vectra.resp_hostname" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.hostname" =>
                    "%{vectra.resp_hostname}"
                }
                on_error => "vectra_resp_hostname_missing"
            }

            mutate {
                convert => {
                    "dest_ip" => "string"
                }
                on_error => "_"
            }

            mutate {
                replace => {
                    "temp_dest_ip" => "%{dest_ip}"
                }
                on_error => "dest_ip_missing"
            }
            mutate {
                convert => {
                    "temp_dest_ip" => "ipaddress"
                }
                on_error => "dest_ip_not_convert"
            }
            if ![dest_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.ip" => "dest_ip"
                    }
                    on_error => "dest_ip_not_string"
                }
            }
            mutate {
                convert => {
                    "flow.dest_ip" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "temp_flow_dest_ip" => "%{flow.dest_ip}"
                }
                on_error => "flow_dest_ip_missing"
            }
            mutate {
                convert => {
                    "temp_flow_dest_ip" => "ipaddress"
                }
                on_error => "flow_dest_ip_not_convert"
            }
            if ![flow_dest_ip_not_convert] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.ip" => "flow.dest_ip"
                    }
                    on_error => "flow_dest_ip_not_string"
                }
            }

            mutate {
                convert => {
                    "dest_port" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.port" => "%{dest_port}"
                }
                on_error => "dest_port_missing"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.target.port" => "integer"
                }
                on_error => "dest_port_not_convert"
            }
            if [dest_port_not_convert] {
                mutate {
                    remove_field => ["event.idm.read_only_udm.target.port"]
                }
                mutate {
                    convert => {
                        "flow.dest_port" => "string"
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.port" => "%{flow.dest_port}"
                    }
                    on_error => "flow_dest_port_missing"
                }
                mutate {
                    convert => {
                        "event.idm.read_only_udm.target.port" => "integer"
                    }
                    on_error => "flow_dest_port_not_convert"
                }
                if [flow_dest_port_not_convert] {
                    mutate {
                        remove_field => ["event.idm.read_only_udm.target.port"]
                    }
                }
            }

            mutate {
                convert => {
                    "vectra.resp_sluid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "vectra_resp_sluid_attribute_labels.value" =>
                    "%{vectra.resp_sluid}"
                }
                on_error => "vectra_resp_sluid_field_missing"
            }
            if ![vectra_resp_sluid_field_missing]
            and [vectra_resp_sluid_attribute_labels][value] != "" {
                mutate {
                    replace => {
                        "vectra_resp_sluid_attribute_labels.key" =>
                        "vectra_resp_sluid"
                    }
                    on_error => "vectra_resp_sluid_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.asset.attribute.labels" =>
                        "vectra_resp_sluid_attribute_labels"
                    }
                    on_error => "vectra_resp_sluid_attribute_labels_missing"
                }
            }

            # network
            mutate {
                convert => {
                    "app_proto" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "app_proto" => "%{app_proto}"
                }
                on_error => "app_proto_not_found"
            }
            mutate {
                replace => {
                    "app_proto_src" => "%{app_proto}"
                }
                on_error => "app_proto_src_not_found"
            }
            mutate {
                convert => {
                    "app_proto_src" => "integer"
                }
                on_error => "_"
            }
            mutate {
                rename => {
                    "app_proto" => "app_protocol_src"
                }
                on_error => "app_protocol_src_not_found"
            }
            if ![app_proto_not_found] {
                @include["parse_app_protocol.include"]
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.application_protocol" =>
                        "%{app_protocol_output}"
                    }
                    on_error => "app_protocol_not_rename"
                }
            }
            app_protocol_src
            mutate {
                convert => {
                    "direction" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "direction" => "%{direction}"
                }
                on_error => "direction_missing"
            }
            mutate {
                lowercase => [ "direction" ]
                on_error => "_"
            }
            if ![direction_missing] and [direction] == "to_server" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.direction" => "OUTBOUND"
                    }
                }
            }
            else if ![direction_missing] and [direction] == "to_client" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.direction" => "INBOUND"
                    }
                }
            }

            mutate {
                convert => {
                    "proto" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "protocol_number_src" => "%{proto}"
                }
                on_error => "no_protocol"
            }
            mutate {
                convert => {
                    "protocol_number_src" => "integer"
                }
                on_error => "protocol_not_converted"
            }
            mutate {
                rename => {
                    "proto" => "protocol_number_src"
                }
                on_error => "framed_protocol_has_value"
            }
            if ![no_protocol] {
                @include["parse_ip_protocol.include"]
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.ip_protocol" =>
                        "%{ip_protocol_out}"
                    }
                    on_error => "ip_protocol_not_rename"
                }
            }
            mutate {
                replace => {
                    "proto" => "%{proto}"
                }
                on_error => "proto_key_not_present"
            }
            if ![proto_key_not_present] {
                mutate {
                    uppercase => [ "proto" ]
                    on_error => "_"
                }
                if [proto] in ['EIGRP', '88', 88 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "EIGRP"
                        }
                    }
                }
                else if [proto] in ['ESP', '50', 50 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "ESP"
                        }
                    }
                }
                else if [proto] in ['ETHERIP', '97', 97 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "ETHERIP"
                        }
                    }
                }
                else if [proto] in ['GRE', '47', 47 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "GRE"
                        }
                    }
                }
                else if [proto] in ['ICMP', '1', 1 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "ICMP"
                        }
                    }
                }
                else if [proto] in ['ICMP6', '58', 58 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "ICMP6"
                        }
                    }
                }
                else if [proto] in ['IGMP', '2', 2 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "IGMP"
                        }
                    }
                }
                else if [proto] in ['IP6IN4', '41', 41 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "IP6IN4"
                        }
                    }
                }
                else if [proto] in ['PIM', '103', 103 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "PIM"
                        }
                    }
                }
                else if [proto] in ['SCTP', '132', 132 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "SCTP"
                        }
                    }
                }
                else if [proto] in ['TCP', '6', 6 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "TCP"
                        }
                    }
                }
                else if [proto] in ['UDP', '17', 17 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "UDP"
                        }
                    }
                }
                else if [proto] in ['UNKNOWN_IP_PROTOCOL', '0', 0 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "UNKNOWN_IP_PROTOCOL"
                        }
                    }
                }
                else if [proto] in ['VRRP', '112', 112 ] {
                    mutate {
                        replace => {
                            'event.idm.read_only_udm.network.ip_protocol' => "VRRP"
                        }
                    }
                }
            }

            mutate {
                convert => {
                    "flow.bytes_toclient" => "uinteger"
                }
                on_error => "flow_bytes_toclient_not_convert"
            }
            if ![flow_bytes_toclient_not_convert] {
                mutate {
                    rename => {
                        "flow.bytes_toclient" =>
                        "event.idm.read_only_udm.network.received_bytes"
                    }
                }
            }

            mutate {
                convert => {
                    "flow.pkts_toclient" => "integer"
                }
                on_error => "flow_pkts_toclient_not_convert"
            }

            if ![flow_pkts_toclient_not_convert] {
                mutate {
                    rename => {
                        "flow.pkts_toclient" =>
                        "event.idm.read_only_udm.network.received_packets"
                    }
                }
            }

            mutate {
                convert => {
                    "flow.bytes_toserver" => "uinteger"
                }
                on_error => "flow_bytes_toserver_value_is_not_uinteger_type"
            }
            if ![flow_bytes_toserver_value_is_not_uinteger_type] {
                mutate {
                    rename => {
                        "flow.bytes_toserver" =>
                        "event.idm.read_only_udm.network.sent_bytes"
                    }
                }
            }
            mutate {
                convert => {
                    "flow.pkts_toserver" => "integer"
                }
                on_error => "flow_pkts_toserver_value_is_not_uinteger_type"
            }
            if ![flow_pkts_toserver_value_is_not_uinteger_type] {
                mutate {
                    rename => {
                        "flow.pkts_toserver" =>
                        "event.idm.read_only_udm.network.sent_packets"
                    }
                }
            }

            # observer
            mutate {
                convert => {
                    "vectra.sensor_uid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "vectra.sensor_uid" => "%{vectra.sensor_uid}"
                }
                on_error => "vectra_sensor_uid_missing"
            }
            if ![vectra_sensor_uid_missing] and [vectra][sensor_uid] != "" {
                if [vectra][sensor_uid] =~ "(^.*\:.*$)" {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.observer.asset_id" =>
                            "%{vectra.sensor_uid}"
                        }
                    }
                }
                else {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.observer.asset_id" =>
                            "Vectra:%{vectra.sensor_uid}"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "vectra.sensor_name" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.observer.hostname" =>
                    "%{vectra.sensor_name}"
                }
                on_error => "vectra_sensor_name_not_found"
            }

            # security result

            mutate {
                replace => {
                    "alert.action" => "%{alert.action}"
                }
                on_error => "alert_action_not_found"
            }
            if ![alert_action_not_found] and [alert][action] =~ "(?i)allowed" {
                mutate {
                    replace => {
                        "allow" => "ALLOW"
                    }
                }
                mutate {
                    merge => {
                        "security_result.action" => "allow"
                    }
                }
            }
            if ![alert_action_not_found] {
                mutate {
                    replace => {
                        "action_details_temp" => "%{alert.action}"
                    }
                }
                mutate {
                    replace => {
                        "security_result.action_details" => "%{action_details_temp}"
                    }
                }
            }
            mutate {
                replace => {
                    "alert.category" => "%{alert.category}"
                }
                on_error => "alert_category_missing"
            }
            if ![alert_category_missing] {
                mutate {
                    merge => {
                        "security_result.category_details" => "alert.category"
                    }
                    on_error => "security_result_category_details_not_replaced"
                }
            }
            for index, updateAt in alert.metadata.updated_at {
                mutate {
                    convert => {
                        "updateAt" => "string"
                    }
                    on_error => "_"
                }
                if [index] == 0 {

                    mutate {
                        replace => {
                            "updateAt" => "%{updateAt}"
                        }
                        on_error => "update_at_missing"
                    }
                    date {
                        match => ["updateAt", "yyyy_MM_dd"]
                        target => "security_result.last_updated_time"
                        on_error => "timestamp_field_not_convert"
                    }
                }
                else {
                    mutate {
                        replace => {
                            "alert_metadata_updated_at_label" => ""
                        }
                    }
                    mutate {
                        replace => {
                            "alert_metadata_updated_at_label.value" => "%{updateAt}"
                        }
                        on_error => "alert_metadata_updated_at_field_missing"
                    }
                    if ![alert_metadata_updated_at_field_missing]
                    and [alert_metadata_updated_at_label][value] != "" {

                        mutate {
                            replace => {
                                "alert_metadata_updated_at_label.key" =>
                                "alert_metadata_updated_at"
                            }
                            on_error => "alert_metadata_updated_at_missing"
                        }
                        mutate {
                            merge => {
                                "security_result.detection_fields" =>
                                "alert_metadata_updated_at_label"
                            }
                            on_error => "alert_metadata_updated_at_label_missing"
                        }
                    }

                }

            }

            mutate {
                convert => {
                    "alert.severity" => "string",
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "alert.severity" => "%{alert.severity}"
                }
                on_error => "alert_severity_not_found"
            }
            if ![alert_severity_not_found] and [alert][severity] == "1" {
                mutate {
                    replace => {
                        "security_result.severity" => "CRITICAL"
                    }
                }
            }
            else if ![alert_severity_not_found] and [alert][severity] == "2" {
                mutate {
                    replace => {
                        "security_result.severity" => "HIGH"
                    }
                }
            }
            else if ![alert_severity_not_found] and [alert][severity] == "3" {
                mutate {
                    replace => {
                        "security_result.severity" => "MEDIUM"
                    }
                }
            }
            mutate {
                convert => {
                    "alert.signature_id" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "security_result.threat_id" => "%{alert.signature_id}"
                }
                on_error => "alert_signature_id_missing"
            }
            mutate {
                convert => {
                    "alert.signature" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "security_result.threat_name" => "%{alert.signature}"
                }
                on_error => "alert_signature_missing"
            }

            mutate {
                convert => {
                    "alert.gid" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "alert_gid_label.value" => "%{alert.gid}"
                }
                on_error => "alert_gid_field_missing"
            }
            if ![alert_gid_field_missing] and [alert_gid_label][value] != "" {
                mutate {
                    replace => {
                        "alert_gid_label.key" => "alert_gid"
                    }
                    on_error => "alert_gid_missing"
                }
                mutate {
                    merge => {
                        "security_result.detection_fields" => "alert_gid_label"
                    }
                    on_error => "alert_gid_label_missing"
                }
            }

            for product in alert.metadata.affected_product {
                mutate {
                    replace => {
                        "alert_metadata_affected_product_label" => ""
                    }
                }
                mutate {
                    convert => {
                        "product" => "string"
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "alert_metadata_affected_product_label.value" =>
                        "%{product}"
                    }
                    on_error => "alert_metadata_affected_product_field_missing"
                }
                if ![alert_metadata_affected_product_field_missing]
                and [alert_metadata_affected_product_label][value] != "" {
                    mutate {
                        replace => {
                            "alert_metadata_affected_product_label.key" =>
                            "alert_metadata_affected_product"
                        }
                        on_error => "alert_metadata_affected_product_missing"
                    }
                    mutate {
                        merge => {
                            "security_result.detection_fields" =>
                            "alert_metadata_affected_product_label"
                        }
                        on_error => "alert_metadata_affected_product_label_missing"
                    }
                }
            }

            for date in alert.metadata.created_at {
                mutate {
                    replace => {
                        "alert_metadata_created_at_label" => ""
                    }
                }
                mutate {
                    convert => {
                        "date" => "string"
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "alert_metadata_created_at_label.value" => "%{date}"
                    }
                    on_error => "alert_metadata_created_at_field_missing"
                }
                if ![alert_metadata_created_at_field_missing]
                and [alert_metadata_created_at_label][value] != "" {

                    mutate {
                        replace => {
                            "alert_metadata_created_at_label.key" =>
                            "alert_metadata_created_at"
                        }
                        on_error => "alert_metadata_created_at_missing"
                    }
                    mutate {
                        merge => {
                            "security_result.detection_fields" =>
                            "alert_metadata_created_at_label"
                        }
                        on_error => "alert_metadata_created_at_label_missing"
                    }
                }
            }

            for category in alert.metadata.former_category {
                mutate {
                    replace => {
                        "alert_metadata_former_category_label" => ""
                    }
                }
                mutate {
                    convert => {
                        "category" => "string"
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "alert_metadata_former_category_label.value" =>
                        "%{category}"
                    }
                    on_error => "alert_metadata_former_category_field_missing"
                }
                if ![alert_metadata_former_category_field_missing]
                and [alert_metadata_former_category_label][value] != "" {
                    mutate {
                        replace => {
                            "alert_metadata_former_category_label.key" =>
                            "alert_metadata_former_category"
                        }
                        on_error => "alert_metadata_former_category_missing"
                    }
                    mutate {
                        merge => {
                            "security_result.detection_fields" =>
                            "alert_metadata_former_category_label"
                        }
                        on_error => "alert_metadata_former_category_label_missing"
                    }
                }
            }
            mutate {
                convert => {
                    "alert.rev" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "alert_rev_label.value" => "%{alert.rev}"
                }
                on_error => "alert_rev_field_missing"
            }
            if ![alert_rev_field_missing] and [alert_rev_label][value] != "" {
                mutate {
                    replace => {
                        "alert_rev_label.key" => "alert_rev"
                    }
                    on_error => "alert_rev_missing"
                }
                mutate {
                    merge => {
                        "security_result.detection_fields" => "alert_rev_label"
                    }
                    on_error => "alert_rev_label_missing"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" => "security_result"
                }
                on_error => "security_result_field_is_missing"
            }

            # additional
            mutate {
                convert => {
                    "flow_id" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "flow_id_label.value.string_value" =>
                    "%{flow_id}"
                }
                on_error => "flow_id_missing"
            }
            if !([flow_id_missing]) and [flow_id_label][value][string_value] != "" {
                mutate {
                    replace => {
                        "flow_id_label.key" => "flow_id"
                    }
                    on_error => "flow_id_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "flow_id_label"
                    }
                    on_error => "flow_id_not_merge"
                }
            }

            mutate {
                convert => {
                    "flow.start" => "string"
                }
                on_error => "_"
            }

            mutate {
