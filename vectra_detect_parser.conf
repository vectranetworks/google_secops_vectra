                    "flow.pkts_toclient" =>
                    "event.idm.read_only_udm.network.received_packets"
                }
            }
        }

        mutate {
            convert => {
                "flow.bytes_toserver" => "uinteger"
            }
            on_error => "flow_bytes_toserver_value_is_not_uinteger_type"
        }
        if ![flow_bytes_toserver_value_is_not_uinteger_type] {
            mutate {
                rename => {
                    "flow.bytes_toserver" =>
                    "event.idm.read_only_udm.network.sent_bytes"
                }
            }
        }
        mutate {
            convert => {
                "flow.pkts_toserver" => "integer"
            }
            on_error => "flow_pkts_toserver_value_is_not_uinteger_type"
        }
        if ![flow_pkts_toserver_value_is_not_uinteger_type] {
            mutate {
                rename => {
                    "flow.pkts_toserver" =>
                    "event.idm.read_only_udm.network.sent_packets"
                }
            }
        }

        # observer
        mutate {
            convert => {
                "vectra.sensor_uid" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "vectra.sensor_uid" => "%{vectra.sensor_uid}"
            }
            on_error => "vectra_sensor_uid_missing"
        }
        if ![vectra_sensor_uid_missing] and [vectra][sensor_uid] != "" {
            if [vectra][sensor_uid] =~ "(^.*\:.*$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.observer.asset_id" =>
                        "%{vectra.sensor_uid}"
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.observer.asset_id" =>
                        "Vectra:%{vectra.sensor_uid}"
                    }
                }
            }
        }
        mutate {
            convert => {
                "vectra.sensor_name" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.observer.hostname" =>
                "%{vectra.sensor_name}"
            }
            on_error => "vectra_sensor_name_not_found"
        }

        # security result

        mutate {
            replace => {
                "alert.action" => "%{alert.action}"
            }
            on_error => "alert_action_not_found"
        }
        if ![alert_action_not_found] and [alert][action] =~ "(?i)allowed" {
            mutate {
                replace => {
                    "allow" => "ALLOW"
                }
            }
            mutate {
                merge => {
                    "security_result.action" => "allow"
                }
            }
        }
        if ![alert_action_not_found] {
            mutate {
                replace => {
                    "action_details_temp" => "%{alert.action}"
                }
            }
            mutate {
                replace => {
                    "security_result.action_details" => "%{action_details_temp}"
                }
            }
        }
        mutate {
            replace => {
                "alert.category" => "%{alert.category}"
            }
            on_error => "alert_category_missing"
        }
        if ![alert_category_missing] {
            mutate {
                merge => {
                    "security_result.category_details" => "alert.category"
                }
                on_error => "security_result_category_details_not_replaced"
            }
        }
        for index, updateAt in alert.metadata.updated_at {
            mutate {
                convert => {
                    "updateAt" => "string"
                }
                on_error => "_"
            }
            if [index] == 0 {

                mutate {
                    replace => {
                        "updateAt" => "%{updateAt}"
                    }
                    on_error => "update_at_missing"
                }
                date {
                    match => ["updateAt", "yyyy_MM_dd"]
                    target => "security_result.last_updated_time"
                    on_error => "timestamp_field_not_convert"
                }
            }
            else {
                mutate {
                    replace => {
                        "alert_metadata_updated_at_label" => ""
                    }
                }
                mutate {
                    replace => {
                        "alert_metadata_updated_at_label.value" => "%{updateAt}"
                    }
                    on_error => "alert_metadata_updated_at_field_missing"
                }
                if ![alert_metadata_updated_at_field_missing]
                and [alert_metadata_updated_at_label][value] != "" {

                    mutate {
                        replace => {
                            "alert_metadata_updated_at_label.key" =>
                            "alert_metadata_updated_at"
                        }
                        on_error => "alert_metadata_updated_at_missing"
                    }
                    mutate {
                        merge => {
                            "security_result.detection_fields" =>
                            "alert_metadata_updated_at_label"
                        }
                        on_error => "alert_metadata_updated_at_label_missing"
                    }
                }

            }

        }

        mutate {
            convert => {
                "alert.severity" => "string",
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "alert.severity" => "%{alert.severity}"
            }
            on_error => "alert_severity_not_found"
        }
        if ![alert_severity_not_found] and [alert][severity] == "1" {
            mutate {
                replace => {
                    "security_result.severity" => "CRITICAL"
                }
            }
        }
        else if ![alert_severity_not_found] and [alert][severity] == "2" {
            mutate {
                replace => {
                    "security_result.severity" => "HIGH"
                }
            }
        }
        else if ![alert_severity_not_found] and [alert][severity] == "3" {
            mutate {
                replace => {
                    "security_result.severity" => "MEDIUM"
                }
            }
        }
        mutate {
            convert => {
                "alert.signature_id" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "security_result.threat_id" => "%{alert.signature_id}"
            }
            on_error => "alert_signature_id_missing"
        }
        mutate {
            convert => {
                "alert.signature" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "security_result.threat_name" => "%{alert.signature}"
            }
            on_error => "alert_signature_missing"
        }

        mutate {
            convert => {
                "alert.gid" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "alert_gid_label.value" => "%{alert.gid}"
            }
            on_error => "alert_gid_field_missing"
        }
        if ![alert_gid_field_missing] and [alert_gid_label][value] != "" {
            mutate {
                replace => {
                    "alert_gid_label.key" => "alert_gid"
                }
                on_error => "alert_gid_missing"
            }
            mutate {
                merge => {
                    "security_result.detection_fields" => "alert_gid_label"
                }
                on_error => "alert_gid_label_missing"
            }
        }

        for product in alert.metadata.affected_product {
            mutate {
                replace => {
                    "alert_metadata_affected_product_label" => ""
                }
            }
            mutate {
                convert => {
                    "product" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "alert_metadata_affected_product_label.value" =>
                    "%{product}"
                }
                on_error => "alert_metadata_affected_product_field_missing"
            }
            if ![alert_metadata_affected_product_field_missing]
            and [alert_metadata_affected_product_label][value] != "" {
                mutate {
                    replace => {
                        "alert_metadata_affected_product_label.key" =>
                        "alert_metadata_affected_product"
                    }
                    on_error => "alert_metadata_affected_product_missing"
                }
                mutate {
                    merge => {
                        "security_result.detection_fields" =>
                        "alert_metadata_affected_product_label"
                    }
                    on_error => "alert_metadata_affected_product_label_missing"
                }
            }
        }

        for date in alert.metadata.created_at {
            mutate {
                replace => {
                    "alert_metadata_created_at_label" => ""
                }
            }
            mutate {
                convert => {
                    "date" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "alert_metadata_created_at_label.value" => "%{date}"
                }
                on_error => "alert_metadata_created_at_field_missing"
            }
            if ![alert_metadata_created_at_field_missing]
            and [alert_metadata_created_at_label][value] != "" {

                mutate {
                    replace => {
                        "alert_metadata_created_at_label.key" =>
                        "alert_metadata_created_at"
                    }
                    on_error => "alert_metadata_created_at_missing"
                }
                mutate {
                    merge => {
                        "security_result.detection_fields" =>
                        "alert_metadata_created_at_label"
                    }
                    on_error => "alert_metadata_created_at_label_missing"
                }
            }
        }

        for category in alert.metadata.former_category {
            mutate {
                replace => {
                    "alert_metadata_former_category_label" => ""
                }
            }
            mutate {
                convert => {
                    "category" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "alert_metadata_former_category_label.value" =>
                    "%{category}"
                }
                on_error => "alert_metadata_former_category_field_missing"
            }
            if ![alert_metadata_former_category_field_missing]
            and [alert_metadata_former_category_label][value] != "" {
                mutate {
                    replace => {
                        "alert_metadata_former_category_label.key" =>
                        "alert_metadata_former_category"
                    }
                    on_error => "alert_metadata_former_category_missing"
                }
                mutate {
                    merge => {
                        "security_result.detection_fields" =>
                        "alert_metadata_former_category_label"
                    }
                    on_error => "alert_metadata_former_category_label_missing"
                }
            }
        }
        mutate {
            convert => {
                "alert.rev" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "alert_rev_label.value" => "%{alert.rev}"
            }
            on_error => "alert_rev_field_missing"
        }
        if ![alert_rev_field_missing] and [alert_rev_label][value] != "" {
            mutate {
                replace => {
                    "alert_rev_label.key" => "alert_rev"
                }
                on_error => "alert_rev_missing"
            }
            mutate {
                merge => {
                    "security_result.detection_fields" => "alert_rev_label"
                }
                on_error => "alert_rev_label_missing"
            }
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.security_result" => "security_result"
            }
            on_error => "security_result_field_is_missing"
        }

        # additional
        mutate {
            convert => {
                "flow_id" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "flow_id_label.value.string_value" =>
                "%{flow_id}"
            }
            on_error => "flow_id_missing"
        }
        if !([flow_id_missing]) and [flow_id_label][value][string_value] != "" {
            mutate {
                replace => {
                    "flow_id_label.key" => "flow_id"
                }
                on_error => "flow_id_missing"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "flow_id_label"
                }
                on_error => "flow_id_not_merge"
            }
        }

        mutate {
            convert => {
                "flow.start" => "string"
            }
            on_error => "_"
        }

        mutate {
            replace => {
                "flow_start_label.value.string_value" => "%{flow.start}"
            }
            on_error => "flow_start_missing"
        }

        if ![flow_start_missing] and [flow][start] != "" {
            mutate {
                replace => {
                    "flow_start_label.key" => "flow_start"
                }
                on_error => "flow_start_missing"
            }

            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" =>
                    "flow_start_label"
                }
                on_error => "flow_start_not_merge"
