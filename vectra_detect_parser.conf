                    on_error => "flow_start_not_merge"
                }
            }

            mutate {
                convert => {
                    "packet_info.linktype" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "packet_info_linktype_label.value.string_value" =>
                    "%{packet_info.linktype}"
                }
                on_error => "packet_info_linktype_missing"
            }
            if !([packet_info_linktype_missing])
            and [packet_info_linktype_label][value][string_value] !="" {
                mutate {
                    replace => {
                        "packet_info_linktype_label.key" => "packet_info_linktype"
                    }
                    on_error => "packet_info_linktype_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "packet_info_linktype_label"
                    }
                    on_error => "packet_info_linktype_not_merge"
                }
            }

            mutate {
                convert => {
                    "packet" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "packet_label.value.string_value" =>
                    "%{packet}"
                }
                on_error => "packet_missing"
            }
            if !([packet_missing]) and [packet_label][value][string_value] !="" {
                mutate {
                    replace => {
                        "packet_label.key" => "packet"
                    }
                    on_error => "packet_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "packet_label"
                    }
                    on_error => "packet_not_merge"
                }
            }

            mutate {
                convert => {
                    "payload_printable" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "payload_printable_label.value.string_value" =>
                    "%{payload_printable}"
                }
                on_error => "payload_printable_missing"
            }
            if !([payload_printable_missing])
            and [payload_printable_label][value][string_value] !="" {
                mutate {
                    replace => {
                        "payload_printable_label.key" => "payload_printable"
                    }
                    on_error => "payload_printable_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "payload_printable_label"
                    }
                    on_error => "payload_printable_not_merge"
                }
            }

            mutate {
                convert => {
                    "payload" => "string"
                }
                on_error => "_"
            }
            mutate {
                replace => {
                    "payload_label.value.string_value" =>
                    "%{payload}"
                }
                on_error => "payload_missing"
            }
            if !([payload_missing]) and [payload_label][value][string_value] !="" {
                mutate {
