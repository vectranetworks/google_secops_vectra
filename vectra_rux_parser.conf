                replace => {
                    "event.idm.read_only_udm.target.user.userid" =>
                    "%{entity_id}"
                }
                on_error => "entity_id_missing"
            }

            mutate {
                replace => {
                    "entity_name" => "%{entity_name}"
                }
                on_error => "entity_name_not_found"
            }
            if ![entity_name_not_found] and [entity_name] =~ "(^.+@.+$)" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.user.email_addresses" =>
