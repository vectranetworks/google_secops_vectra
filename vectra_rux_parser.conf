                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
                    "USER_RESOURCE_ACCESS"
                }
            }
        } else if [principal_present] == "true" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
