            replace => {
                "principal_present" => "false"
                "target_present" => "false"
                "principal_user_present" => "false"
            }
        }
        # metadata
        mutate {
            convert => {
                "event_timestamp" => "string"
            }
            on_error => "_"
        }
        date {
            match => ["event_timestamp", "UNIX", "UNIX_MX","ISO8601"]
            on_error => "event_timestamp_field_is_missing"
        }

        mutate {
            convert => {
                "id" => "string"
            }
            on_error => "id_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_log_id" => "%{id}"
            }
            on_error => "id_missing"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
            }
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_name" => "XDR"
            }
        }
        mutate {
            convert => {
                "version" => "string"
            }
