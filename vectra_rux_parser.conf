        mutate {
            replace => {
                "event.idm.read_only_udm.principal.user.user_display_name" =>
                "%{locked_by}"
            }
            on_error => "locked_by_missing"
        }

        #target

        mutate {
            convert => {
                "entity_id" => "string"
            }
            on_error => "entity_id_not_convert"
        }
        mutate {
            convert => {
                "entity_name" => "string"
            }
            on_error => "entity_name_not_convert"
        }

        if ![type_missing] and [type] == "host" {
            mutate {
                replace => {
                    "entity_id" => "%{entity_id}"
                }
                on_error => "entity_id_not_found"
            }
            if ![entity_id_not_found] and [entity_id] =~ "(^.*\:.*$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.asset_id" =>
                        "%{entity_id}"
                    }
                    on_error => "entity_id_missing"
                }
            }
            else {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.asset_id" =>
                        "Vectra:%{entity_id}"
