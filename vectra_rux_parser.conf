            }
            if ![username_missing] and [var_username][value] != "" {
                mutate {
                    replace => {
                        "var_username.key" => "username"
                    }
                    on_error => "username_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.user.attribute.labels"
                        => "var_username"
                    }
                    on_error => "username_not_merge"
                }
            }
        }

        mutate {
            convert => {
                "user_role" => "string"
