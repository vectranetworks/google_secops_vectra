    # Lockdown
    else if ![locked_by_present] or ![lock_event_timestamp_present] {

        mutate {
            replace => {
                "principal_present" => "false"
            }
        }
        #metadata
        mutate {
            convert => {
                "lock_event_timestamp" => "string"
            }
            on_error => "lock_event_timestamp_not_string"
        }
        date {
            match => ["lock_event_timestamp", "UNIX", "UNIX_MS","ISO8601"]
