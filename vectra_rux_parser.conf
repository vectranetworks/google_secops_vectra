filter {
    mutate {
        gsub => ["message", "\\r\\n", ""]
    }

    grok {
        match => {
            "message" =>
            "<%{INT}>\\s*%{SYSLOGTIMESTAMP}\\s*%{HOSTNAME}\\s*%{DATA:log_type}\\s*(-)?:\\s*%{GREEDYDATA:message}"
        }
        overwrite => ["message"]
        on_error => "message_not_match"
    }
    # Audit specific
    mutate {
        gsub => ["message", '(.*)\\"message\\":(.*)', '$1"msg":$2']
    }
    json {
        source => "message"
        array_function => "split_columns"
        on_error => "invalid_json"
    }
    if [invalid_json] {
        drop {
            tag => "TAG_MALFORMED_ENCODING"
        }
    }
    mutate {
        convert => {
            "timestamp" => "string"
        }
        on_error => "timestamp_not_convert"
    }

    mutate {
        convert => {
            "vectra_timestamp" => "string"
        }
        on_error => "vectra_timestamp_not_convert"
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
    }
    mutate {
        convert => {
            "d_type_vname" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_detection_log_type" => "%{d_type_vname}"
        }
        on_error => "is_detection_log_type"
    }
    mutate {
        convert => {
            "category" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_scoring_log_type" => "%{category}"
        }
        on_error => "category_present"
    }
    mutate {
        convert => {
            "username" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_audit_log_type" => "%{username}"
        }
        on_error => "username_present"
    }
    mutate {
        convert => {
            "locked_by" => "string"
        }
        on_error => "_"
    }
    mutate {
        convert => {
            "lock_event_timestamp" => "string"
        }
        on_error => "_"
    }
    mutate {
        replace => {
            "check_lockdown_log_type" => "%{locked_by}"
        }
        on_error => "locked_by_present"
    }
    mutate {
        replace => {
            "check_lockdown_log_type" => "%{lock_event_timestamp}"
        }
        on_error => "lock_event_timestamp_present"
    }

    # Detection
    if ![is_detection_log_type] {
        mutate {
            replace => {
                "principal_present" => "false"
                "principal_user_present" => "false"
                "target_present" => "false"
            }
        }
        mutate {
            convert => {
                "event_timestamp" => "string"
            }
            on_error => "event_timestamp_not_convert"
        }
        date {
            match => ["event_timestamp", "ISO8601", "UNIX", "UNIX_MS"]
            on_error => "event_timestamp_not_valid"
        }

        mutate {
            convert => {
                "type" => "string"
            }
            on_error => "type_not_convert"
        }

        mutate {
            replace => {
                "type" => "%{type}"
            }
            on_error => "type_not_found"
        }

        mutate {
            replace => {
                "srcip" => "%{src_ip}"
            }
            on_error => "src_ip_not_found"
        }
        mutate {
            convert => {
                "srcip" => "ipaddress"
            }
            on_error => "valid_ip"
        }
        if ![valid_ip] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.principal.ip" => "src_ip"
                }
                on_error => "src_ip_not_found"
            }
            if ![src_ip_not_found] {
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }
        }
        mutate {
            convert => {
                "entity_id" => "string"
            }
            on_error => "entity_id_not_convert"
        }
        mutate {
            convert => {
                "entity_uid" => "string"
            }
            on_error => "entity_uid_not_convert"
        }

        if ![type_not_found] and [type] == "host" {
            mutate {
                replace => {
                    "entity_id" => "%{entity_id}"
                }
                on_error => "entity_id_not_found"
            }
            if ![entity_id_not_found] and [entity_id] =~ "(^.*\\:.*$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.asset_id" =>
                        "%{entity_id}"
                    }
                    on_error => "entity_id_missing"
                }
            }
            else {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.asset_id" =>
                        "Vectra:%{entity_id}"
                    }
                    on_error => "entity_id_missing"
                }
            }
            if ![entity_id_missing] {
                mutate {
                    replace => {
                        "principal_present" => "true"
                    }
                }
            }
            mutate {
                replace => {
                    "entity_uid" => "%{entity_uid}"
                }
                on_error => "entity_uid_not_found"
            }
            if ![entity_uid_not_found] and [entity_uid] =~ "(^.{0,256}$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.hostname" =>
                        "%{entity_uid}"
                    }
                    on_error => "entity_uid_not_string"
                }
                if ![entity_uid_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }
        }
        else {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.user.userid" =>
                    "%{entity_id}"
                }
                on_error => "entity_id_missing"
            }
            if ![entity_id_missing] {
                mutate {
                    replace => {
                        "principal_user_present" => "true"
                    }
                }
            }

            mutate {
                replace => {
                    "entity_uid" => "%{entity_uid}"
                }
                on_error => "entity_uid_not_found"
            }
            if ![entity_uid_not_found] and [entity_uid] =~ "(^.+@.+$)" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.user.email_addresses"
                        => "entity_uid"
                    }
                    on_error => "entity_uid_missing"
                }
                if ![entity_uid_missing] {
                    mutate {
                        replace => {
                            "principal_user_present" => "true"
                        }
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "var_entity_uid" => ""
                    }
                    on_error => "_"
                }
                mutate {
                    replace => {
                        "var_entity_uid.value" => "%{entity_uid}"
                    }
                    on_error => "var_entity_uid_value_missing"
                }
                if !([var_entity_uid_value_missing])
                and [var_entity_uid][value] != "" {
                    mutate {
                        replace => {
                            "var_entity_uid.key" => "entity_uid"
                        }
                        on_error => "var_entity_uid_key_missing"
                    }
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.principal.user.attribute.labels" =>
                            "var_entity_uid"
                        }
                        on_error => "entity_uid_not_merge"
                    }
                }
            }
        }

        mutate {
            convert => {
                "category" => "string"
            }
            on_error => "category_not_convert"
        }
        mutate {
            replace => {
                "category" => "%{category}"
            }
            on_error => "category_not_found"
        }
        if ![category_not_found] and
        ([category] =~ "(?i)COMMAND & CONTROL" or [category] =~ "(?i)COMMAND_AND_CONTROL") {
            mutate {
                replace => {
                    "category_temp" => "NETWORK_COMMAND_AND_CONTROL"
                }
            }
        }
        else if ![category_not_found] and
        ([category] =~ "(?i)BOTNET ACTIVITY" or [category] =~ "(?i)BOTNET_ACTIVITY") {
            mutate {
                replace => {
                    "category_temp" => "NETWORK_MALICIOUS"
                }
            }
        }
        else if ![category_not_found] and [category] =~ "(?i)EXFILTRATION" {
            mutate {
                replace => {
                    "category_temp" => "DATA_EXFILTRATION"
                }
            }
        }
        else if ![category_not_found] and
        ([category] =~ "(?i)LATERAL MOVEMENT" or [category] =~ "(?i)LATERAL_MOVEMENT") {
            mutate {
                replace => {
                    "category_temp" => "ACL_VIOLATION"
                }
            }
        }
        else if ![category_not_found] and [category] =~ "(?i)RECONNAISSANCE" {
            mutate {
                replace => {
                    "category_temp" => "NETWORK_RECON"
                }
            }
        }
        else {
            mutate {
                replace => {
                    "category_temp" => "UNKNOWN_CATEGORY"
                }
            }
        }

        mutate {
            merge => {
                "security_result_temp.category_details" => "category"
            }
            on_error => "security_result_temp_category_details_not_merge"
        }

        mutate {
            merge => {
                "security_result_temp.category" => "category_temp"
            }
            on_error => "security_result_temp_category_not_merge"
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_event_type" =>
                "%{d_type_vname}"
            }
            on_error => "d_type_vname_missing"
        }

        mutate {
            convert => {
                "detection_id" => "string"
            }
            on_error => "detection_id_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_log_id" =>
                "%{detection_id}"
            }
            on_error => "detection_id_missing"
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.product_name" => "XDR"
            }
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
            }
        }

        # url
        mutate {
            convert => {
                "url" => "string"
            }
            on_error => "url_not_convert"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.url" => "%{url}"
            }
            on_error => "url_missing"
        }

        for index,name in mitre {
            mutate {
                replace => {
                    "techniques_temp" => ""
                }
            }
            mutate {
                replace => {
                    "techniques_temp.id" => "%{name}"
                }
                on_error => "mitre_not_string"
            }
            mutate {
                merge => {
                    "security_result_temp.attack_details.techniques" =>
                    "techniques_temp"
                }
                on_error => "techniques_temp_not_merge"
            }
        }

        mutate {
            convert => {
                "certainty" => "string"
            }
            on_error => "certainty_not_convert"
        }
        mutate {
            replace => {
                "security_result_temp.confidence_score" => "%{certainty}"
            }
            on_error => "certainty_missing"
        }
        mutate {
            convert => {
                "security_result_temp.confidence_score" => "float"
            }
            on_error => "certainty_not_convert"
        }
        if [certainty_not_convert] {
            mutate {
                remove_field => ["security_result_temp.confidence_score"]
            }
        }

        mutate {
            replace => {
                "var_type.value" => "%{type}"
            }
            on_error => "type_missing"
        }
        if !([type_missing]) and [var_type][value] != "" {
            mutate {
                replace => {
                    "var_type.key" => "type"
                }
                on_error => "type_missing"
            }
            mutate {
                merge => {
                    "security_result_temp.detection_fields" => "var_type"
                }
                on_error => "type_not_merge"
            }
        }

        mutate {
            convert => {
                "id" => "string"
            }
            on_error => "id_conversion_error"
        }
        mutate {
            replace => {
                "id_label.value.string_value" => "%{id}"
            }
            on_error => "id_not_found"
        }
        if ![id_not_found] and [id_label][value][string_value] != "" {
            mutate {
                replace => {
                    "id_label.key" => "id"
                }
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.additional.fields" => "id_label"
                }
            }
        }

        mutate {
            replace => {
                "var_detection_type" => ""
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "var_detection_type.value" => "%{detection_type}"
            }
            on_error => "detection_type_not_string"
        }
        if ![detection_type_not_string] and [var_detection_type][value] != "" {
            mutate {
                replace => {
                    "var_detection_type.key" => "detection_type"
                }
                on_error => "detection_type_missing"
            }
            mutate {
                merge => {
                    "security_result_temp.detection_fields" =>
                    "var_detection_type"
                }
                on_error => "detection_type_not_merge"
            }
        }

        mutate {
            convert => {
                "triaged" => "string"
            }
            on_error => "triaged_conversion_error"
        }
        mutate {
            replace => {
                "triaged_label.value" => "%{triaged}"
            }
            on_error => "triaged_not_found"
        }
        if ![triaged_not_found] and [triaged_label][value] != "" {
            mutate {
                replace => {
                    "triaged_label.key" => "triaged"
                }
            }
            mutate {
                merge => {
                    "security_result_temp.detection_fields" => "triaged_label"
                }
            }
        }

        mutate {
            convert => {
                "threat" => "string"
            }
            on_error => "threat_not_convert"
        }
        mutate {
            replace => {
                "security_result_temp.risk_score" => "%{threat}"
            }
            on_error => "threat_missing"
        }
        mutate {
            convert => {
                "security_result_temp.risk_score" => "float"
            }
            on_error => "threat_not_convert"
        }
        if [threat_not_convert] {
            mutate {
                remove_field => ["security_result_temp.risk_score"]
            }
        }

        mutate {
            convert => {
                "severity" => "string"
            }
            on_error => "severity_not_convert"
        }
        mutate {
            replace => {
                "security_result_temp.severity_details" => "%{severity}"
            }
            on_error => "severity_missing"
        }

        mutate {
            convert => {
                "detection_href" => "string"
            }
            on_error => "detection_href_not_convert"
        }
        mutate {
            replace => {
                "security_result_temp.url_back_to_product" =>
                "%{detection_href}"
            }
            on_error => "detection_href_not_string"
        }

        for key, value in detail map {
            mutate {
                replace => {
                    "detail_label" => ""
                }
            }
            mutate {
                convert => {
                    "key" => "string"
                }
                on_error => "detail_key_conversion_error"
            }

            mutate {
                convert => {
                    "value" => "string"
                }
                on_error => "detail_value_conversion_error"
            }

            mutate {
                replace => {
                    "detail_label.value.string_value" => "%{value}"
                }
                on_error => "detail_not_found"
            }

            if ![detail_not_found]
            and [detail_label][value][string_value] != "" {
                mutate {
                    replace => {
                        "detail_label.key" => "detail_%{key}"
                    }
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "detail_label"
                    }
                }
            }
        }

        mutate {
            merge => {
                "event.idm.read_only_udm.security_result" =>
                "security_result_temp"
            }
            on_error => "event_idm_read_only_udm_security_result_not_merge"
        }

        # Event type
        if [d_type_vname] == "M365 Internal Spearphishing" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
                    "EMAIL_TRANSACTION"
                }
            }
        }
        else if [d_type_vname] == "M365 Suspicious Mail Forwarding" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" =>
                    "EMAIL_UNCATEGORIZED"
                }
            }
        }
        else if [d_type_vname] in ["ICMP Tunnel", "Hidden Tunnel",
        "Hidden DNS Tunnel", "Multi-home Fronted Tunnel", "Peer-To-Peer",
        "Suspect Domain Activity", "Suspicious Relay", "TOR Activity",
        "Automated Replication", "ICMP Tunnel: Client", "ICMP Tunnel: Server",
        "Kerberoasting: Targeted Weak Cipher Response", "Shell Knocker Client",
        "Shell Knocker Server", "SQL Injection Activity", "Stage Loader",
        "Suspicious Remote Execution", "Data Smuggler", "Hidden DNS Tunnel",
        "ICMP Tunnel", "Smash and Grab", "Suspect TCP Activity",
        "Suspect DNS Activity", "Azure AD TOR Activity", "AWS TOR Activity",
        "AWS ECR Hijacking", "AWS Suspect Organization Exit",
        "AWS Cryptomining", "AWS Suspect Traffic Mirror Creation",
        "Azure Anomalous AppService WebJob Activity", "Azure Cryptomining",
        "Azure TOR Activity", "Azure Anomalous App Service WebJob Activity"] {
            if [principal_present] == "true" and [target_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "NETWORK_CONNECTION"
                    }
                }
            }else if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "STATUS_UPDATE"
                    }
                }
            }
        }
        else if [d_type_vname] in ["Hidden HTTP Tunnel", "Hidden HTTPS Tunnel",
        "Stealth HTTP Post", "Suspicious HTTP", "Hidden HTTP Tunnel",
        "Hidden HTTPS Tunnel", "Suspect HTTP Activity",
        "Suspect HTTPS Activity"] {
            if [principal_present] == "true" and [target_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "NETWORK_HTTP"
                    }
                }
            }else if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "STATUS_UPDATE"
                    }
                }
            }
        }
        else if [d_type_vname] in ["Malware Update", "Cryptocurrency Mining",
        "Ransomware File Activity", "Suspicious Active Directory Operations",
        "Data Gathering", "Novel Admin Protocol Usage",
        "Novel External Destination Port", "Novel Access to SMB Admin Share",
        "Single Weak Kerberos Cipher Response", "M365 Attacker Tool: Ruler",
        "M365 Disabling of Security Tools", "M365 Log Disabling Attempt",
        "M365 Malware Stage: Upload", "M365 Ransomware"] {
            if [principal_present] == "true" and [target_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "NETWORK_UNCATEGORIZED"
                    }
                }
            }else if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "STATUS_UPDATE"
                    }
                }
            }
        }
        else if [d_type_vname] in ["New Host", "New Host Role",
        "Novel Mac Vendor", "Vectra Indicator Match", "Port Scan"] {
            if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "SCAN_HOST"
                    }
                }
            }
        }
        else if [d_type_vname] in ["Threat Intelligence Match",
        "Vectra Threat Intelligence Match", "Outbound DoS",
        "Outbound Port Sweep", "File Share Enumeration",
        "Internal Darknet Scan", "Kerberoasting: Weak Cipher Request",
        "Kerberoasting: SPN Sweep", "Kerberos Account Scan", "RDP Recon",
        "RPC Recon", "RPC Targeted Recon", "SMB Account Scan",
        "Suspicious LDAP Query", "Suspicious Port Scan",
        "Suspicious Port Sweep","Threat Intelligence Match",
        "Threat Intelligence Match","M365 Power Automate HTTP Flow Creation",
        "M365 Suspicious Power Automate Flow Creation",
        "AWS External Network Discovery", "AWS Network Configuration Discovery",
        "AWS Organization Discovery", "AWS S3 Enumeration",
        "AWS Suspect Discovery from EC2 Instance",
        "AWS Suspect Escalation Reconnaissance",
        "AWS Suspicious EC2 Enumeration", "AWS User Permissions Enumeration"] {
            if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "SCAN_HOST"
                    }
                }
            }
        }
        else if [d_type_vname] in ["Azure AD Login From Suspicious Location",
        "Azure AD MFA-Failed Suspicious Sign-On", "Azure AD Suspicious Sign-on",
        "Azure AD Suspected Compromised Access",
        "Azure AD Successful Brute-Force",
        "Azure AD Login Attempt to Disabled Account",
        "Azure Managed Identity Anomaly"] {
            if [principal_user_present] == "true" {
                # As pe the UDM the user, who performing the user action,
                # can be considered as target. Hence, we have mapped principal
                # field to target.
                mutate {
                    rename => {
                        "event.idm.read_only_udm.principal" =>
                        "event.idm.read_only_udm.target"
                    }
                    on_error => "traget_already_has_value"
                }
                if ![traget_already_has_value] {
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.metadata.event_type" =>
                            "USER_LOGIN"
                        }
                    }
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.extensions.auth.auth_details"
                            => "%{d_type_vname}"
                        }
                    }
                }
            }
        }
        else if [d_type_vname] in ["External Remote Access", "Brute-Force",
        "Kerberos Brute-Sweep", "Brute-Force",
        "Privilege Anomaly: Unusual Account on Host",
        "Privilege Anomaly: Unusual Host", "Privilege Anomaly: Unusual Service",
        "Privilege Anomaly: Unusual Service - Insider",
        "Privilege Anomaly: Unusual Service from Host",
        "Privilege Anomaly: Unusual Trio",
        "SMB Brute-Force", "Suspicious Admin", "Suspicious Remote Desktop",
        "M365 DLL Hijacking Activity", "M365 Risky Exchange Operation",
        "M365 Phishing Simulation Configuration Change",
        "M365 SecOps Mailbox Change", "M365 Suspicious Teams Application",
        "M365 Suspicious Mailbox Manipulation",
        "M365 Suspicious Mailbox Rule Creation",
        "M365 eDiscovery Exfil", "M365 Exfiltration Before Termination",
        "M365 Suspicious Download Activity",
        "M365 Suspicious Exchange Transport Rule",
        "M365 Suspect Power Automate Activity",
        "M365 Suspicious Sharing Activity", "Azure AD Admin Account Creation",
        "Azure AD Cross Tenant Access Change",
        "Azure AD Domain Settings Modified",
        "Azure AD New Partner Added to Organization",
        "Azure AD Redundant Access Creation",
        "Azure AD Suspicious OAuth Application",
        "Azure AD Suspicious Access from Cloud Provider",
        "Azure AD Successful Brute-Force â€“ Failed Login",
        "Azure AD Suspicious Device Registration",
        "Azure AD Suspicious Factor Registration",
        "Azure AD Change to Trusted IP Configuration",
        "Azure AD MFA Disabled",
        "Azure AD Newly Created Admin Account",
        "Azure AD Privilege Operation Anomaly",
        "Azure AD Unusual Scripting Engine Usage",
        "Azure AD Brute Force Attempt",
        "Azure AD Brute-Force Attempt",
        "AWS Root Credential Usage",
        "AWS Suspicious Credential Usage",
        "AWS Suspect Credential Access from EC2",
        "AWS Suspect Credential Access from ECS",
