            }
            on_error => "source_ip_missing"
        }
        mutate {
            convert => {
                "temp_source_ip" => "ipaddress"
            }
            on_error => "source_ip_not_convert"
        }
        if ![source_ip_not_convert] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.principal.ip" => "source_ip"
                }
                on_error => "source_ip_not_string"
            }
            if ![source_ip_not_string] {
