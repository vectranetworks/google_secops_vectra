        mutate {
            convert => {
                "temp_security_result.confidence_score" => "float"
            }
            on_error => "certainty_not_convert"
        }
        if [certainty_not_convert] {
            mutate {
                remove_field => ["temp_security_result.confidence_score"]
            }
        }


        mutate {
            convert => {
                "unlock_event_timestamp" => "string"
            }
            on_error => "_"
        }
        mutate {
            replace => {
                "unlock_event_timestamp_label.value" =>
                "%{unlock_event_timestamp}"
            }
            on_error => "unlock_event_timestamp_field_missing"
        }
        if ![unlock_event_timestamp_field_missing]
        and [unlock_event_timestamp_label][value] != "" {
            mutate {
                replace => {
                    "unlock_event_timestamp_label.key" =>
                    "unlock_event_timestamp"
                }
                on_error => "unlock_event_timestamp_missing"
            }
            mutate {
                merge => {
                    "temp_security_result.detection_fields" =>
                    "unlock_event_timestamp_label"
                }
                on_error => "unlock_event_timestamp_label_missing"
            }
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.security_result" =>
                "temp_security_result"
            }
            on_error => "security_result_merge_failed"
        }

        if  ![type_missing] and [type] =~ "(?i)HOST"
        and [principal_present] == "true" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "SCAN_HOST"
                }
            }
        }
        if ![type_missing] and [type] =~ "(?i)ACCOUNT"
        and [principal_present] == "true" {
