            }
            else {
                mutate {
                    replace => {
                        "var_name.value" => "%{name}"
                    }
                    on_error => "var_name_value_missing"
                }
                if !([var_name_value_missing]) and [var_name][value] != "" {
                    mutate {
                        replace => {
                            "var_name.key" => "name"
                        }
                        on_error => "var_name_key_missing"
                    }
                    mutate {
                        merge => {
                            "event.idm.read_only_udm.target.user.attribute.labels"
