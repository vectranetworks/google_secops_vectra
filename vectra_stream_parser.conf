        mutate {
            replace => {
                "local_resp_label.key" => "local_resp"
            }
            on_error => "local_resp_missing"
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.additional.fields" => "local_resp_label"
            }
            on_error => "local_resp_not_merge"
        }
    }
    mutate {
        replace => {
            "orig_hostname" => "%{orig_hostname}"
        }
        on_error => "orig_hostname_not_found"
    }
    if ![orig_hostname_not_found] and [orig_hostname] =~ "(^.{0,256}$)" {
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.hostname" => "%{orig_hostname}"
