filter {
    mutate {
        gsub => ["message", "\\r\\n", ""]
    }
    json {
        source => "message"
        array_function => "split_columns"
        on_error => "invalid_json"
    }
    mutate {
        convert => {
            "metadata_type" => "string"
        }
        on_error => "metadata_type_is_string"
    }
    mutate {
        replace => {
            "metadata_type" => "%{metadata_type}"
        }
        on_error => "metadata_type_not_found"
    }
    if [invalid_json] or [metadata_type_not_found] {
        # This part of the parser added to support fallback parsing for other logType than JSON format.

        # Create unique fields (query for dns, conn_state for conn, lease_time for dhcp, tags for http, because they are unique to the log type
        mutate {
            replace => {
                "dhcp_server_ip" => ""
                "dns_server_ips" => ""
                "assigned_ip" => ""
                "log_type" => ""
                "query" => ""
                "community_id" => ""
                "has_target" => "false"
                "has_principal" => "false"
                "id.orig_h" => ""
                "id.orig_p" => ""
                "id.resp_h" => ""
                "id.resp_p" => ""
                "idorig_h" => ""
                "idorig_p" => ""
                "resp_h" => ""
                "resp_p" => ""
                "resp_hostname" => ""
                "orig_hostname" => ""
                "mail_from" => ""
                "rcpt_to" => ""
                "subject" => ""
                "helo" => ""
                "ja3" => ""
                "ja3s" => ""
                "issuer" => ""
                "cipher" => ""
                "server_name" => ""
                "version" => ""
                "version_num" => ""
                "established" => ""
                "next_protocol" => ""
                "client_cipher" => ""
                "curve" => ""
                "certificate.subject" => ""
                "certificate.issuer" => ""
                "certificate.version" => ""
                "certificate.serial" => ""
                "certificate.not_valid_after" => ""
                "certificate.not_valid_before" => ""
                "rtt" => ""
                "endpoint" => ""
                "lease_time" => ""
                "mac" => ""
                "trans_id" => ""
                "duration" => ""
                "resp_domain" => ""
                "service" => ""
                "conn_state" => ""
                "proto" => ""
                "AA" => ""
                "RD" => ""
                "RA" => ""
                "TC" => ""
                "qtype" => ""
                "qclass" => ""
                "question" => ""
                "rcode" => ""
                "answer" => ""
                "answers" => ""
                "username" => ""
                "account_session_id" => ""
                "radius_type" => ""
                "account_session_time" => ""
                "connect_info" => ""
                "security_result" => ""
                "calling_station_id" => ""
                "result" => ""
                "dst_display_name" => ""
                "src_display_name" => ""
                "src_luid" => ""
                "dst_luid" => ""
                "nas_identifier" => ""
                "role" => ""
                "event_timestamp" => ""
                "beacon_type" => ""
                "beacon_uid" => ""
                "method" => ""
                "uri" => ""
                "host" => ""
                "user_agent" => ""
                "referrer" => ""
                "orig_mime_types" => ""
                "resp_mime_types" => ""
                "status_code" => ""
                "status_msg" => ""
                "host_multihomed" => ""
                "proxied" => ""
                "domain" => ""
                "status" => ""
                "success" => ""
                "cookie" => ""
                "cipher_alg" => ""
                "mac_alg" => ""
                "compression_alg" => ""
                "kex_alg" => ""
                "host_key_alg" => ""
                "host_key" => ""
                "hassh" => ""
                "hasshServer" => ""
                "path" => ""
                "name" => ""
                "result_code" => ""
                "host_name" => ""
                "grok_pattern_failure" => "false"
                "_raw" => ""
                "vectra_kv" => ""
                "uid" => ""
                "metadata_type" => ""
                "orig_sluid" => ""
                "intermediary" => ""
                "has_target_file" => ""
                "qclass_name" => ""
                "hostname" => ""
                "first_orig_resp_data_pkt" => ""
                "first_orig_resp_data_pkt_time" => ""
                "keyboard_layout" => ""
                "operation" => ""
                "query_scope" => ""
                "has_princ_machine_id" => "false"
                "has_nw_dhcp" => "false"
                "eve_json.alert.category" => ""
                "eve_json.alert.metadata.attack_target" => ""
                "eve_json.alert.metadata.signature_severity" => ""
                "eve_json.alert.signature" => ""
                "eve_json.alert.gid" => ""
                "eve_json.alert.metadata.confidence" => ""
                "eve_json.alert.metadata.deployment" => ""
                "eve_json.alert.metadata.tag" => ""
                "eve_json.alert.rev" => ""
                "eve_json.alert.signature_id" => ""
                "eve_json.app_proto" => ""
                "eve_json.dest_ip" => ""
                "eve_json.dest_port" => ""
                "eve_json.direction" => ""
                "rrname" => ""
                "rrtype" => ""
                "tx_id" => ""
                "type" => ""
                "eve_json.event_type" => ""
                "eve_json.flow.bytes_toclient" => ""
                "eve_json.flow.bytes_toserver" => ""
                "eve_json.flow.dest_ip" => ""
                "eve_json.flow.dest_port" => ""
                "eve_json.flow.pkts_toclient" => ""
                "eve_json.flow.pkts_toserver" => ""
                "eve_json.flow.src_ip" => ""
                "eve_json.flow.src_port" => ""
                "eve_json.flow.start" => ""
                "eve_json.flow_id" => ""
                "eve_json.packet" => ""
                "eve_json.packet_info.linktype" => ""
                "eve_json.payload" => ""
                "eve_json.payload_printable" => ""
                "eve_json.pkt_src" => ""
                "eve_json.proto" => ""
                "eve_json.src_ip" => ""
                "eve_json.src_port" => ""
                "eve_json.stream" => ""
                "eve_json.timestamp" => ""
                "eve_json.tx_id" => ""
                "eve_json.vlan" => ""
                "id.ip_ver" => ""
                "local_orig" => ""
                "local_resp" => ""
                "orig_huid" => ""
                "resp_huid" => ""
                "resp_sluid" => ""
                "dns_questions" => ""
                "has_dns_field" => "false"
            }
        }

        mutate {
            convert => {
                "grok_pattern_failure" => "boolean"
            }
        }
        json {
            source => "message"
            array_function => "split_columns"
            on_error => "not_json"
        }

        # remove syslog header
        if [not_json] {
            grok {
                match => {
                    "message" => [
                    "<\\d+>.* METADATA_(?P<log_type>\\w+) \\[ (?P<vectra_kv>.*)\\]",
                    "%{GREEDYDATA}METADATA_(?P<log_type>\\w+) \\[ (?P<vectra_kv>.*)\\]",
                    "<\\d+>.* (?P<log_type>rsyslog) .*"
                    ]
                }
                overwrite => [ "log_type","vectra_kv"]
                on_error => "grok_pattern_failure"
            }
        }
        if ![not_json] {
            mutate {
                convert => {
                    "ts" => "string"
                }
            }
        }
        if [_raw] != "" {
            grok {
                match => {
                    "_raw" => "%{GREEDYDATA}METADATA_%{DATA:log_type} \\[ %{GREEDYDATA:vectra_kv} \\]"
                }
                overwrite => [ "log_type","vectra_kv"]
                on_error => "grok_pattern_failure"
            }
        }
        if [log_type] == "rsyslog" or [grok_pattern_failure] {
            drop {
                tag => "TAG_MALFORMED_MESSAGE"
            }
        }
        if [trans_id] != "" {
            mutate {
                convert => {
                    "trans_id" => "string"
                }
            }
        }
        if [proto] != "" {
            mutate {
                convert => {
                    "proto" => "string"
                }
            }
        }
        if [vectra_kv] != "" {
            if [vectra_kv] =~ "eve_json" {
                mutate {
                    gsub => ["vectra_kv","(\\\s+)(\\S+)=", "#$2="]
                }
                mutate {
                    gsub => ["vectra_kv",'\\\"' , ""]
                }
            }
            else {
                mutate {
                    gsub => ["vectra_kv", "(\\w+[.]?\\w+)=\"", "#$1=\""]
                }
                mutate {
                    gsub => ["vectra_kv", "(\\w+[.]?\\w+)= ", "#$1= "]
                }
                mutate {
                    gsub => ["vectra_kv", "\\\"", ""]
                }
                mutate {
                    gsub => ["vectra_kv", 'query=#', "query="]
                }
            }
            # Pull fields out of raw log.
            kv {
                source => "vectra_kv"
                field_split => "#"
                value_split => "="
            }
        }
        # Parse date.
        date {
            match => ["ts", "RFC3339", "UNIX_MS", "ISO8601" ]
            on_error => "invalid_time_format"
        }

        if [uid] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_log_id" => "%{uid}"
                }
                on_error => "field_not_found"
            }
        }

        if [eve_json][alert][category] != "" {
            mutate {
                merge => {
                    "security_result.category_details" => "eve_json.alert.category"
                }
                on_error => "field_not_found"
            }
        }
        if [eve_json][alert][metadata][attack_target] != "" {
            mutate {
                replace => {
                    "attack_target_label.key" => "eve_json_alert_metadata_attack_target"
                    "attack_target_label.value.string_value" => "%{eve_json.alert.metadata.attack_target}"
                }
                on_error => "field_not_found"
            }
            if ![field_not_found] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "attack_target_label"
                    }
                    on_error => "field_not_found"
                }
            }
        }

        if [eve_json][alert][metadata][signature_severity] != "" {
            if [eve_json][alert][metadata][signature_severity] == "Critical" {
                mutate {
                    replace => {
                        "security_result.severity" => "CRITICAL"
                    }
                }
            }
            else if [eve_json][alert][metadata][signature_severity] == "Major" {
                mutate {
                    replace => {
                        "security_result.severity" => "MEDIUM"
                    }
                }
            }
            else if [eve_json][alert][metadata][signature_severity] == "Minor" {
                mutate {
                    replace => {
                        "security_result.severity" => "LOW"
                    }
                }
            }
            else if [eve_json][alert][metadata][signature_severity] == "Informational" {
                mutate {
                    replace => {
                        "security_result.severity" => "INFORMATIONAL"
                    }
                }
            }
            mutate {
                replace => {
                    "security_result.severity_details" => "%{eve_json.alert.metadata.signature_severity}"
                }
                on_error => "field_not_found"
            }
        }
        if [eve_json][alert][signature] != "" {
            mutate {
                replace => {
                    "security_result.summary" => "%{eve_json.alert.signature}"
                }
                on_error => "signature_missing"
            }
        }

        if [metadata_type] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_event_type" => "%{metadata_type}"
                }
                on_error => "field_not_found"
            }
        }

        if [eve_json][alert][gid] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.group.product_object_id" => "%{eve_json.alert.gid}"
                }
                on_error => "field_not_found"
            }
        }

        if [eve_json][alert][metadata][confidence] != "" {
            if [eve_json][alert][metadata][confidence] =~ "Low" {
                mutate {
                    replace => {
                        "security_result.confidence" => "LOW_CONFIDENCE"
                    }
                }
            }
            else if [eve_json][alert][metadata][confidence] =~ "Medium" {
                mutate {
                    replace => {
                        "security_result.confidence" => "MEDIUM_CONFIDENCE"
                    }
                }
            }
            else if [eve_json][alert][metadata][confidence] =~ "High" {
                mutate {
                    replace => {
                        "security_result.confidence" => "HIGH_CONFIDENCE"
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "security_result.confidence" => "UNKNOWN_CONFIDENCE"
                    }
                }
            }
        }

        if [eve_json][alert][metadata][deployment] != "" {
            mutate {
                convert => {
                    "eve_json.alert.metadata.deployment" => "string"
                }
                on_error => "already_string"
            }
            mutate {
                replace => {
                    "deployment_label.key" => "deployment"
                    "deployment_label.value" => "%{eve_json.alert.metadata.deployment}"
                }
                on_error => "no_deployment_label"
            }
            if ![no_deployment_label] {
                mutate {
                    merge => {
                        "security_result.rule_labels" => "deployment_label"
                    }
                    on_error => "no_deployment_label"
                }
            }
        }

        if [eve_json][alert][metadata][tag] != "" {
            mutate {
                replace => {
                    "tag_label.key" => "tag"
                    "tag_label.value.string_value" => "%{eve_json.alert.metadata.tag}"
                }
                on_error => "no_tag_label"
            }
            if ![no_tag_label] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "tag_label"
                    }
                    on_error => "no_tag_label"
                }
            }
        }

        if [eve_json][alert][rev] != "" {
            mutate {
                replace => {
                    "rev_label.key" => "rev"
                    "rev_label.value.string_value" => "%{eve_json.alert.rev}"
                }
                on_error => "no_rev_label"
            }
            if ![no_rev_label] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "rev_label"
                    }
                    on_error => "no_rev_label"
                }
            }
        }

        if [eve_json][alert][signature_id] != "" {
            mutate {
                replace => {
                    "signature_id_label.key" => "signature_id"
                    "signature_id_label.value.string_value" => "%{eve_json.alert.signature_id}"
                }
                on_error => "no_signature_id_label"
            }
            if ![no_signature_id_label] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "signature_id_label"
                    }
                    on_error => "no_signature_id_label"
                }
            }
        }

        if [eve_json][app_proto] != "" {
            mutate {
                replace => {
                    "app_proto_label.key" => "app_proto"
                    "app_proto_label.value.string_value" => "%{eve_json.app_proto}"
                }
                on_error => "no_app_proto"
            }
            if ![no_app_proto] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "app_proto_label"
                    }
                    on_error => "no_app_proto"
                }
            }
        }

        if [eve_json][dest_ip] != "" {
            mutate {
                merge => {
                    "event.idm.read_only_udm.target.ip" => "eve_json.dest_ip"
                    "event.idm.read_only_udm.target.asset.ip" => "eve_json.dest_ip"
                }
                on_error => "no_dest_ip"
            }
            mutate {
                replace => {
                    "has_target" => "true"
                }
            }
        }

        if [eve_json][dest_port] != "" {
            mutate {
                convert => {
                    "eve_json.dest_port" => "integer"
                }
                on_error => "dest_port_not_integer"
            }
            mutate {
                rename => {
                    "eve_json.dest_port" => "event.idm.read_only_udm.target.port"
                }
            }
        }

        if [eve_json][direction] != "" {
            mutate {
                replace => {
                    "direction_label.key" => "direction"
                    "direction_label.value.string_value" => "%{eve_json.direction}"
                }
                on_error => "no_direction_label"
            }
            if ![no_direction_label] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "direction_label"
                    }
                    on_error => "no_direction_label"
                }
            }
        }

        mutate {
            replace => {
                "meta_event_type" => "GENERIC_EVENT"
                "event.idm.read_only_udm.metadata.product_name" => "Vectra Stream"
                "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
            }
        }

        if [conn_state] == "S0" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Connection attempt seen, no reply"
                }
            }
        }
        else if [conn_state] == "S1" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Connection established, not terminated"
                }
            }
        }
        else if [conn_state] == "S2" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Connection established and close attempt by originator seen (but no reply from responder)"
                }
            }
        }
        else if [conn_state] == "S3" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Connection established and close attempt by responder seen (but no reply from originator)"
                }
            }
        }
        else if [conn_state] == "SF" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Normal SYN/FIN completion"
                }
            }
        }
        else if [conn_state] == "REJ" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Connection attempt rejected"
                }
            }
        }
        else if [conn_state] == "RSTO" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Connection established, originator aborted (sent a RST)"
                }
            }
        }
        else if [conn_state] == "RSTOS0" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Originator sent a SYN followed by a RST, we never saw a SYN-ACK from the responder"
                }
            }
        }
        else if [conn_state] == "RSTOSH" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Responder sent a SYN ACK followed by a RST, we never saw a SYN from the (purported) originator"
                }
            }
        }
        else if [conn_state] == "RSTR" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Established, responder aborted"
                }
            }
        }
        else if [conn_state] == "SH" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Originator sent a SYN followed by a FIN, we never saw a SYN ACK from the responder (hence the connection was “half” open)"
                }
            }
        }
        else if [conn_state] == "SHR" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: Responder sent a SYN ACK followed by a FIN, we never saw a SYN from the originator"
                }
            }
        }
        else if [conn_state] == "OTH" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{conn_state}: No SYN seen, just midstream traffic (a partial connection that was not later closed)"
                }
            }
        }

        # Principal
        mutate {
            replace => {
                "idorig_h" => "%{id.orig_h}"
            }
            on_error => "orig_h_not_found"
        }
        if [idorig_h] != "" {
            mutate {
                merge => {
                    "event.idm.read_only_udm.principal.ip" => "idorig_h"
                    "event.idm.read_only_udm.principal.asset.ip" => "idorig_h"
                }
                on_error => "orig_h_not_found"
            }
            mutate {
                replace => {
                    "has_princ_machine_id" => "true"
                }
                on_error => "orig_h_not_found"
            }
        }
        if [dns_server_ips] != "" {
            for ips in dns_server_ips {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.principal.ip" => "ips"
                    }
                    on_error => "dns_server_ips_not_found"
                }
            }
        }
        mutate {
            convert => {
                "id.orig_p" => "string"
            }
            on_error => "orig_h_already_string"
        }
        mutate {
            replace => {
                "idorig_p" => "%{id.orig_p}"
            }
            on_error => "orig_p_already_string"
        }
        if [idorig_p] != "" {
            mutate {
                convert => {
                    "idorig_p" => "integer"
                }
                on_error => "orig_p_not_integer"
            }
            mutate {
                rename => {
                    "idorig_p" => "event.idm.read_only_udm.principal.port"
                }
            }
        }

        if [orig_hostname] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.hostname" => "%{orig_hostname}"
                }
            }
            mutate {
                replace => {
                    "has_princ_machine_id" => "true"
                }
            }
        }
        else if [orig_sluid] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.hostname" => "%{orig_sluid}"
                }
                on_error => "field_not_found"
            }
            mutate {
                replace => {
                    "has_princ_machine_id" => "true"
                }
            }
        }

        mutate {
            replace => {
                "event.idm.read_only_udm.observer.asset_id" => "Sensor_UID:%{sensor_uid}"
            }
        }

        if [endpoint] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.application" => "%{endpoint}"
                }
            }
        }
        if [username] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.user.userid" => "%{username}"
                }
            }
        }

        if [rrname] != "" {
            mutate {
                replace => {
                    "dns_questions.name" => "%{rrname}"
                }
                on_error => "rrname_not_found"
            }
        }
        if [dns_questions] != "" {
            mutate {
                merge => {
                    "event.idm.read_only_udm.network.dns.questions" => "dns_questions"
                }
                on_error => "dns_question_empty"
            }
            mutate {
                replace => {
                    "has_dns_field" => "true"
                }
            }
        }
        if [rrtype] != "" {
            mutate {
                replace => {
                    "rrtype_label.key" => "rrtype"
                    "rrtype_label.value.string_value" => "%{rrtype}"
                }
                on_error => "rrtype_not_found"
            }
            if ![rrtype_not_found] {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" => "rrtype_label"
                    }
                    on_error => "rrtype_not_found"
                }
            }
        }

        if [tx_id] != "" {
            mutate {
                replace => {
                    "tx_id_label.key" => "tx_id"
