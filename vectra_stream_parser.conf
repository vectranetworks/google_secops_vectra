                on_error => "orig_ip_bytes_missing"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
                }
                on_error => "orig_ip_bytes_not_convert"
            }
            if [orig_ip_bytes_not_convert] {
                mutate {
                    remove_field => ["event.idm.read_only_udm.network.sent_bytes"]
                }
            }
            mutate {
                convert => {
                    "proto" => "string"
                }
                on_error => "proto_not_string"
            }
            mutate {
                replace => {
                    "protocol_number_src" => "%{proto}"
                }
                on_error => "no_protocol"
            }
            mutate {
                convert => {
                    "protocol_number_src" => "integer"
                }
                on_error => "protocol_not_converted"
            }
            mutate {
                rename => {
                    "proto" => "protocol_number_src"
                }
                on_error => "protocol_number_src_not_rename"
            }
            if ![no_protocol] {
                @include["parse_ip_protocol.include"]
                mutate {
                    replace => {
                        "event.idm.read_only_udm.network.ip_protocol" =>
                        "%{ip_protocol_out}"
                    }
                    on_error => "ip_protocol_not_rename"
                }
            }
            else {
                mutate {
                    replace => {
                        "protocol_number_src" => "%{protoName}"
                    }
                    on_error => "no_protocol"
                }
                mutate {
                    convert => {
                        "protocol_number_src" => "integer"
                    }
                    on_error => "protocol_not_converted"
                }
                mutate {
                    rename => {
                        "protoName" => "protocol_number_src"
                    }
                    on_error => "protocol_number_src_not_rename"
                }
                if ![no_protocol] {
                    @include["parse_ip_protocol.include"]
                    mutate {
                        replace => {
                            "event.idm.read_only_udm.network.ip_protocol" =>
                            "%{ip_protocol_out}"
                        }
                        on_error => "ip_protocol_not_rename"
                    }
                }
            }
            mutate {
                convert => {
                    "resp_ip_bytes" => "string"
                }
                on_error => "resp_ip_bytes_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.network.received_bytes" =>
                    "%{resp_ip_bytes}"
                }
                on_error => "resp_ip_bytes_missing"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.network.received_bytes" => "uinteger"
                }
                on_error => "resp_ip_bytes_not_convert"
            }
            if [resp_ip_bytes_not_convert] {
                mutate {
                    remove_field =>
                    ["event.idm.read_only_udm.network.received_bytes"]
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.application" => "%{service}"
                }
                on_error => "service_not_string"
            }
            mutate {
                convert => {
                    "session_count" => "string"
                }
                on_error => "session_count_not_convert"
            }
            mutate {
                replace => {
                    "session_count_label.value.string_value" => "%{session_count}"
                }
                on_error => "session_count_missing"
            }
            if !([session_count_missing]) and
            [session_count_label][value][string_value] != "" {
                mutate {
                    replace => {
                        "session_count_label.key" => "session_count"
                    }
                    on_error => "session_count_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "session_count_label"
                    }
                    on_error => "session_count_not_merge"
                }
            }
            mutate {
                convert => {
                    "uid" => "string"
                }
                on_error => "uid_not_string"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.product_log_id" => "%{uid}"
                }
                on_error => "uid_not_found"
            }
            mutate {
                merge => {
                    "event.idm.read_only_udm.security_result" =>
                    "security_result_temp"
                }
                on_error => "event_idm_read_only_udm_security_result_not_merge"
            }
            if [principal_present] == "true" and [target_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "NETWORK_CONNECTION"
                    }
                }
            }
            else if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "STATUS_UPDATE"
                    }
                }
            }

        }
        else if [metadata_type] == "metadata_dcerpc" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.network.application_protocol" =>
                    "DCERPC"
                }
            }
            mutate {
                replace => {
                    "domain" => "%{domain}"
                }
                on_error => "domain_not_found"
            }
            if ![domain_not_found] and [domain] =~ "(^.{0,256}$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.domain.name" => "%{domain}"
                    }
                    on_error => "domain_not_string"
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.application" => "%{endpoint}"
                }
                on_error => "endpoint_not_string"
            }
            mutate {
                replace => {
                    "hostname" => "%{hostname}"
                }
                on_error => "hostname_not_found"
            }
            if ![hostname_not_found] and [hostname] =~ "(^.{0,256}$)" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.principal.hostname" =>
                        "%{hostname}"
                    }
                    on_error => "hostname_not_string"
                }
                if ![hostname_not_string] {
                    mutate {
                        replace => {
                            "principal_present" => "true"
                        }
                    }
                }
            }
            mutate {
                convert => {
                    "operation" => "string"
                }
                on_error => "operation_not_convert"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.description" => "%{operation}"
                }
                on_error => "operation_missing"
            }
            mutate {
                convert => {
                    "rtt" => "string"
                }
                on_error => "rtt_not_converted"
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.network.session_duration.seconds" =>
                    "%{rtt}"
                }
                on_error => "rtt_not_found"
            }
            mutate {
                convert => {
                    "event.idm.read_only_udm.network.session_duration.seconds" =>
                    "integer"
                }
                on_error => "rtt_not_integer"
            }
            if [rtt_not_integer] {
                mutate {
                    remove_field =>
                    ["event.idm.read_only_udm.network.session_duration.seconds"]
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.principal.user.userid" => "%{username}"
                }
                on_error => "username_not_string"
            }
            if [principal_present] == "true" and [target_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "NETWORK_CONNECTION"
                    }
                }
            }
            else if [principal_present] == "true" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.metadata.event_type" =>
                        "STATUS_UPDATE"
                    }
                }
            }
        }
        mutate {
            merge => {
                "@output" = "event"
            }
        }
    }
}