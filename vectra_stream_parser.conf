filter {
    mutate {
        gsub => ["message", "\\r\\n", ""]
    }
    json {
        source => "message"
        array_function => "split_columns"
        on_error => "invalid_json"
    }
    mutate {
        convert => {
            "metadata_type" => "string"
        }
        on_error => "metadata_type_is_string"
    }
    mutate {
        replace => {
            "metadata_type" => "%{metadata_type}"
        }
        on_error => "metadata_type_not_found"
    }
    if [invalid_json] or [metadata_type_not_found] {
        drop {
            tag => "TAG_MALFORMED_ENCODING"
        }
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.product_event_type" =>
            "%{metadata_type}"
        }
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
        on_error => "Vectra_not_string"
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.vendor_name" => "Vectra"
        }
        on_error => "Vectra_not_string"
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.product_name" => "Stream"
        }
        on_error => "Stream_not_string"
    }
    mutate {
        replace => {
            "principal_present" => "false"
            "target_present" => "false"
            "auth_details_present" => "false"
            "target_user_present" => "false"
        }
    }
    mutate {
        convert => {
            "id.ip_ver" => "string"
        }
        on_error => "id_ip_ver_not_convert"
    }
    mutate {
        replace => {
            "id_ip_ver_label.value.string_value" => "%{id.ip_ver}"
        }
        on_error => "id_ip_ver_missing"
    }
    if !([id_ip_ver_missing]) and [id_ip_ver_label][value][string_value] != "" {
        mutate {
            replace => {
                "id_ip_ver_label.key" => "id_ip_ver"
            }
            on_error => "id_ip_ver_missing"
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.additional.fields" => "id_ip_ver_label"
            }
            on_error => "id_ip_ver_not_merge"
        }
    }
    mutate {
        replace => {
            "id_orig_h" => "%{id.orig_h}"
        }
        on_error => "id_orig_h_not_present"
    }
    mutate {
        convert => {
            "id_orig_h" => "ipaddress"
        }
        on_error => "id_orig_h_not_convert"
    }

    if ![id_orig_h_not_convert] {
        mutate {
            merge => {
                "event.idm.read_only_udm.principal.ip" => "id.orig_h"
            }
            on_error => "id_orig_h_not_string"
        }
        if ![id_orig_h_not_string] {
            mutate {
                replace => {
                    "principal_present" => "true"
                }
            }
        }
    }
    mutate {
        convert => {
            "id.orig_p" => "string"
        }
        on_error => "id_orig_p_not_convert"
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.principal.port" => "%{id.orig_p}"
        }
        on_error => "id_orig_p_missing"
    }
    mutate {
        convert => {
            "event.idm.read_only_udm.principal.port" => "integer"
        }
        on_error => "id_orig_p_not_convert"
    }
    if [id_orig_p_not_convert] {
        mutate {
            remove_field => ["event.idm.read_only_udm.principal.port"]
        }
    }
    mutate {
        replace => {
            "id_resp_h" => "%{id.resp_h}"
        }
        on_error => "id_resp_h_not_present"
    }
    mutate {
        convert => {
            "id_resp_h" => "ipaddress"
        }
        on_error => "id_resp_h_not_convert"
    }
    if ![id_resp_h_not_convert] {
