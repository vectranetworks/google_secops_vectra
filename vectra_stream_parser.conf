        mutate {
            remove_field => ["event.idm.read_only_udm.target.port"]
        }
    }
    mutate {
        convert => {
            "local_orig" => "string"
        }
        on_error => "local_orig_not_convert"
    }
    mutate {
        replace => {
            "local_orig_label.value.string_value" => "%{local_orig}"
        }
        on_error => "local_orig_missing"
    }
    if !([local_orig_missing]) and
    [local_orig_label][value][string_value] != "" {
        mutate {
            replace => {
                "local_orig_label.key" => "local_orig"
            }
            on_error => "local_orig_missing"
        }
        mutate {
            merge => {
                "event.idm.read_only_udm.additional.fields" => "local_orig_label"
            }
            on_error => "local_orig_not_merge"
        }
    }
    mutate {
        convert => {
            "local_resp" => "string"
        }
        on_error => "local_resp_not_convert"
    }
    mutate {
        replace => {
            "local_resp_label.value.string_value" => "%{local_resp}"
        }
        on_error => "local_resp_missing"
    }
    if !([local_resp_missing]) and
