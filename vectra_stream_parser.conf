            }
            mutate {
                convert => {
                    "index" => "string"
                }
                on_error => "index_conversion_failed"
            }
            mutate {
                convert => {
                    "iter_san_dns" => "string"
                }
                on_error => "iter_san_dns_not_convert"
            }
            mutate {
                replace => {
                    "iter_san_dns_label.value.string_value" => "%{iter_san_dns}"
                }
                on_error => "iter_san_dns_missing"
            }
            if !([iter_san_dns_missing]) and
            [iter_san_dns_label][value][string_value] != "" {
                mutate {
                    replace => {
                        "iter_san_dns_label.key" => "san_dns_%{index}"
                    }
                    on_error => "iter_san_dns_missing"
                }
                mutate {
                    merge => {
                        "event.idm.read_only_udm.additional.fields" =>
                        "iter_san_dns_label"
                    }
                    on_error => "iter_san_dns_not_merge"
                }
            }
        }
        mutate {
